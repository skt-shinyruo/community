name: Backend Architecture Guardrails

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  community-app-ddd-guardrails:
    name: community-app DDD guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run DDD architecture tests
        working-directory: backend
        run: >
          mvn -pl community-app -am
          -Dtest=DddLayeringArchTest,DomainBoundaryArchTest,InfraBoundaryArchTest,ControllerBoundaryArchTest,DtoBoundaryArchTest,ListenerBoundaryArchTest
          test

      - name: Run community-app full test suite
        working-directory: backend
        run: mvn -pl community-app -am test
