name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**

jobs:
  backend-build:
    name: backend-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Secret scan (best-effort)
        run: bash scripts/secret-scan.sh

      - name: Build (skip tests)
        run: mvn -q -DskipTests package

  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Test
        run: mvn -q test

  frontend-lint-build:
    name: frontend-lint-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm -C frontend ci

      - name: Unit Test
        run: npm -C frontend test

      - name: Build
        run: npm -C frontend run build
