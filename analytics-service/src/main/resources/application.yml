server:
  port: 8085

analytics:
  storage: redis
  max-days-range: 31

spring:
  application:
    name: analytics-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  data:
    redis:
      host: ${ANALYTICS_REDIS_HOST:127.0.0.1}
      port: ${ANALYTICS_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:${AUTH_JWT_HMAC_SECRET:}}

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    # 默认使用 Nacos；仅在显式设置 DUBBO_REGISTRY_ADDR 时覆盖（应急/迁移窗口）。
    address: "${DUBBO_REGISTRY_ADDR:nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}}"
    parameters:
      namespace: ${NACOS_NAMESPACE:}
      group: ${NACOS_GROUP:DEFAULT_GROUP}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: com.nowcoder.community
  consumer:
    check: false
    retries: 0
    timeout: 3000
  provider:
    timeout: 3000
