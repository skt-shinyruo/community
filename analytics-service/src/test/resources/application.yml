analytics:
  storage: memory
  max-days-range: 31

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

community:
  metrics:
    basic-auth:
      username: prometheus
      password: test-prometheus-pass-please-change

spring:
  application:
    name: analytics-service
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    address: N/A
  protocol:
    name: dubbo
    port: -1
  consumer:
    check: false
    init: false
    lazy: true
    retries: 0
    timeout: 3000
  provider:
    timeout: 3000
