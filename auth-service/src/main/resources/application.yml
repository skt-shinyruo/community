server:
  port: 8082

spring:
  application:
    name: auth-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  data:
    redis:
      host: ${AUTH_REDIS_HOST:127.0.0.1}
      port: ${AUTH_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

auth:
  refresh:
    store: db
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  registration:
    activation-base-url: ${AUTH_ACTIVATION_BASE_URL:}
    expose-activation-link: ${AUTH_EXPOSE_ACTIVATION_LINK:false}
    mail:
      enabled: ${AUTH_MAIL_ENABLED:false}
      from: ${AUTH_MAIL_FROM:no-reply@community.local}
      subject: 激活账号
  password-reset:
    reset-base-url: ${AUTH_PASSWORD_RESET_BASE_URL:${auth.registration.activation-base-url:}}
    store: redis
    ttl-seconds: 600
    expose-reset-link: ${AUTH_EXPOSE_RESET_LINK:false}
  login-rate-limit:
    enabled: true
    window-seconds: 60
    max-failures-per-ip: 20
    max-failures-per-user: 5
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

security:
  jwt:
    hmac-secret: ${AUTH_JWT_HMAC_SECRET:${JWT_HMAC_SECRET:}}
    issuer: community-auth
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    refresh-cookie-name: refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
    refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}

gateway:
  origin-guard:
    enabled: true
    allowed-origins:
      - http://localhost:5173
      - http://localhost:12881
      - http://localhost:12888
    # 生产建议 fail-closed：allowlist 漏配时拒绝敏感 cookie 会话入口（login/refresh/logout）。
    fail-open-when-allowlist-empty: false

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    # 默认使用 Nacos；仅在显式设置 DUBBO_REGISTRY_ADDR 时覆盖（应急/迁移窗口）。
    address: "${DUBBO_REGISTRY_ADDR:nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}}"
    parameters:
      namespace: ${NACOS_NAMESPACE:}
      group: ${NACOS_GROUP:DEFAULT_GROUP}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: com.nowcoder.community
  consumer:
    check: false
    retries: 0
    timeout: 3000
