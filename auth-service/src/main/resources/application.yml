server:
  port: 8082

spring:
  application:
    name: auth-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: ${AUTH_DB_URL:jdbc:mysql://127.0.0.1:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${AUTH_DB_USERNAME:${MYSQL_USER:}}
    password: ${AUTH_DB_PASSWORD:${MYSQL_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${AUTH_REDIS_HOST:127.0.0.1}
      port: ${AUTH_REDIS_PORT:6379}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.auth.user
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

auth:
  refresh:
    store: redis
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  registration:
    activation-base-url: ${AUTH_ACTIVATION_BASE_URL:http://localhost:8080}
    expose-activation-link: ${AUTH_EXPOSE_ACTIVATION_LINK:false}
    mail:
      enabled: ${AUTH_MAIL_ENABLED:false}
      from: ${AUTH_MAIL_FROM:no-reply@community.local}
      subject: 激活账号
  password-reset:
    store: redis
    ttl-seconds: 600
    expose-reset-link: ${AUTH_EXPOSE_RESET_LINK:false}
  login-rate-limit:
    enabled: true
    window-seconds: 60
    max-failures-per-ip: 20
    max-failures-per-user: 5
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

security:
  jwt:
    hmac-secret: ${AUTH_JWT_HMAC_SECRET:${JWT_HMAC_SECRET:}}
    issuer: community-auth
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    refresh-cookie-name: refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: Lax
    refresh-cookie-secure: false
    allowed-origins:
      - http://localhost:12881
