auth:
  user-client:
    base-url: http://user-service
    internal-token: test-internal-token
  refresh:
    store: memory
  captcha:
    store: memory
    ttl-seconds: 60
    max-failures: 3
  password-reset:
    store: memory
    ttl-seconds: 600
    expose-reset-link: true
  registration:
    activation-base-url: http://localhost:8080
    expose-activation-link: true
    mail:
      enabled: false
  login-rate-limit:
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

security:
  jwt:
    hmac-secret: test-auth-secret-please-change-at-least-32bytes

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
