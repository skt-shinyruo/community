auth:
  refresh:
    store: memory
  captcha:
    store: memory
    ttl-seconds: 60
    max-failures: 3
  password-reset:
    reset-base-url: http://localhost:8080
    store: memory
    ttl-seconds: 600
    expose-reset-link: true
  registration:
    activation-base-url: http://localhost:8080
    expose-activation-link: true
    mail:
      enabled: false
  login-rate-limit:
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

security:
  jwt:
    hmac-secret: test-auth-secret-please-change-at-least-32bytes

community:
  metrics:
    basic-auth:
      username: prometheus
      password: test-prometheus-pass-please-change

spring:
  application:
    name: auth-service
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    address: N/A
  protocol:
    name: dubbo
    port: -1
  consumer:
    check: false
    init: false
    lazy: true
    retries: 0
    timeout: 3000
