server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    import:
      - ${NACOS_CONFIG_IMPORT_SHARED:optional:nacos:community-shared.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
      - ${NACOS_CONFIG_IMPORT_SERVICE:optional:nacos:community-app.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
  application:
    name: community-app
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10GB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10GB}
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:${NACOS_SERVER_ADDR:localhost:8848}}
        metadata:
          version: ${SERVICE_VERSION:@project.version@}
          deployment.environment: ${DEPLOYMENT_ENVIRONMENT:local}
          zone: ${SERVICE_ZONE:local}
          traffic.group: ${SERVICE_TRAFFIC_GROUP:baseline}
          release.track: ${SERVICE_RELEASE_TRACK:stable}
          weight: ${SERVICE_WEIGHT:100}
          protocol: http
          capabilities: ${SERVICE_CAPABILITIES:}
          management.port: ${MANAGEMENT_SERVER_PORT:${SERVER_PORT}}
          draining: ${SERVICE_DRAINING:false}
      config:
        server-addr: ${SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR:${NACOS_SERVER_ADDR:localhost:8848}}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_CONFIG_GROUP:COMMUNITY}
        file-extension: yaml
  datasource:
    # Local HA keeps MySQL single-primary for writes; switch DB_PRIMARY_HOST after manual promotion.
    url: ${DB_URL:jdbc:mysql://${DB_PRIMARY_HOST:127.0.0.1}:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:${MYSQL_USER:community}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:communitypass}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  elasticsearch:
    # Comma-separated node list, for example http://elasticsearch-1:9200,http://elasticsearch-2:9200
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-handlers-package: com.nowcoder.community.infra.persistence.mybatis
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    elasticsearch:
      enabled: true

community:
  logging:
    service-version: ${SERVICE_VERSION:@project.version@}
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:}
  observability:
    runtime-logging:
      enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_LOGGING_ENABLED:true}
      startup-summary-enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_STARTUP_SUMMARY_ENABLED:true}
      periodic-summary-enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_PERIODIC_SUMMARY_ENABLED:true}
      periodic-summary-interval: ${COMMUNITY_OBSERVABILITY_RUNTIME_PERIODIC_SUMMARY_INTERVAL:60s}
      jvm:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_ENABLED:true}
        memory-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_MEMORY_THRESHOLD_PERCENT:85}
        gc-pause-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_GC_PAUSE_THRESHOLD_MS:200}
        direct-memory-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_DIRECT_MEMORY_THRESHOLD_PERCENT:85}
      executors:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_EXECUTORS_ENABLED:true}
        saturation-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_EXECUTORS_SATURATION_THRESHOLD_PERCENT:85}
      datasource:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_DATASOURCE_ENABLED:true}
        pool-pending-threshold: ${COMMUNITY_OBSERVABILITY_RUNTIME_DATASOURCE_POOL_PENDING_THRESHOLD:1}
      sql:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_SQL_ENABLED:true}
        slow-query-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_SQL_SLOW_QUERY_THRESHOLD_MS:500}
      redis:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_REDIS_ENABLED:true}
        pool-pending-threshold: ${COMMUNITY_OBSERVABILITY_RUNTIME_REDIS_POOL_PENDING_THRESHOLD:1}
        slow-command-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_REDIS_SLOW_COMMAND_THRESHOLD_MS:100}
      kafka:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_KAFKA_ENABLED:true}
        consumer-lag-threshold: ${COMMUNITY_OBSERVABILITY_RUNTIME_KAFKA_CONSUMER_LAG_THRESHOLD:1000}
      oss:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_OSS_ENABLED:true}
        slow-operation-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_OSS_SLOW_OPERATION_THRESHOLD_MS:1000}
      http-client:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_HTTP_CLIENT_ENABLED:true}
        slow-request-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_HTTP_CLIENT_SLOW_REQUEST_THRESHOLD_MS:1000}
      jobs:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_JOBS_ENABLED:true}
        slow-job-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_JOBS_SLOW_JOB_THRESHOLD_MS:30000}
      cache:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_CACHE_ENABLED:true}
        hit-ratio-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_CACHE_HIT_RATIO_THRESHOLD_PERCENT:80}
      security:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_SECURITY_ENABLED:true}
      logging-system:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_LOGGING_SYSTEM_ENABLED:true}
        queue-pressure-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_LOGGING_SYSTEM_QUEUE_PRESSURE_THRESHOLD_PERCENT:80}
      system:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_ENABLED:true}
        fd-usage-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_FD_USAGE_THRESHOLD_PERCENT:80}
        disk-usage-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_DISK_USAGE_THRESHOLD_PERCENT:90}
        cpu-load-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_CPU_LOAD_THRESHOLD_PERCENT:85}
      http:
        access-log-enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_HTTP_ACCESS_LOG_ENABLED:true}
        slow-request-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_HTTP_SLOW_REQUEST_THRESHOLD_MS:1000}
        exclude-paths:
          - /actuator/health
          - /actuator/info

security:
  jwt:
    # Required (>= 32 bytes). Set JWT_HMAC_SECRET via env/secret store.
    hmac-secret: ${JWT_HMAC_SECRET:}
    issuer: ${JWT_ISSUER:community-auth}
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    refresh-cookie-name: refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
    refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}

gateway:
  origin-guard:
    enabled: true
    allowed-origins: ${AUTH_ORIGIN_GUARD_ALLOWED_ORIGINS:}
    # 生产建议 fail-closed：allowlist 漏配时拒绝认证相关敏感写入口（/api/auth/**）。
    fail-open-when-allowlist-empty: false

auth:
  refresh:
    store: db
    cleanup:
      enabled: ${AUTH_REFRESH_CLEANUP_ENABLED:true}
      interval-ms: ${AUTH_REFRESH_CLEANUP_INTERVAL_MS:3600000}
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  registration:
    code:
      store: redis
      ttl-seconds: ${AUTH_REGISTRATION_CODE_TTL_SECONDS:600}
      max-failures: ${AUTH_REGISTRATION_CODE_MAX_FAILURES:3}
      resend-cooldown-seconds: ${AUTH_REGISTRATION_CODE_RESEND_COOLDOWN_SECONDS:60}
      expose-code: ${AUTH_REGISTRATION_EXPOSE_CODE:false}
    draft:
      store: ${AUTH_REGISTRATION_DRAFT_STORE:redis}
      ttl-seconds: ${AUTH_REGISTRATION_DRAFT_TTL_SECONDS:1800}
    mail:
      enabled: ${AUTH_MAIL_ENABLED:false}
      from: ${AUTH_MAIL_FROM:no-reply@community.local}
      subject: 注册验证码
  password-reset:
    reset-base-url: ${AUTH_PASSWORD_RESET_BASE_URL:}
    store: redis
    ttl-seconds: 600
    request-window-seconds: ${AUTH_PASSWORD_RESET_REQUEST_WINDOW_SECONDS:3600}
    max-requests-per-email: ${AUTH_PASSWORD_RESET_MAX_REQUESTS_PER_EMAIL:3}
    max-requests-per-ip: ${AUTH_PASSWORD_RESET_MAX_REQUESTS_PER_IP:20}
  login-rate-limit:
    enabled: true
    window-seconds: 60
    max-failures-per-ip: 20
    max-failures-per-user: 5
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

http:
  idempotency:
    enabled: true
    store: DB

xxl:
  job:
    enabled: false
    admin:
      addresses: ${XXL_JOB_ADMIN_ADDRESSES:}
      accessToken: ${XXL_JOB_ACCESS_TOKEN:}
    executor:
      appname: ${XXL_JOB_EXECUTOR_APPNAME:}
      address: ${XXL_JOB_EXECUTOR_ADDRESS:}

content:
  storage: redis
  events:
    publisher: local
  score:
    refresh:
      enabled: true
      batch-size: 200

events:
  outbox:
    enabled: true
    batch-size: 50
    processing-lease: 30s
    max-retries: 50
    base-backoff: 5s
    max-backoff: 10m
    worker-fixed-delay-ms: 1000

social:
  storage: db
  events:
    publisher: local

oss:
  client:
    base-url: ${OSS_CLIENT_BASE_URL:http://community-oss:18090}

search:
  storage: es
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000
  index:
    prefix: community_posts_v

analytics:
  max-days-range: 31
  ingest:
    enabled: false
    record-uv: true
    record-dau: true
    include-paths:
      - /api/posts/**
      - /api/search/**
      - /api/notices/**
    exclude-paths:
      - /api/analytics/**
      - /api/auth/**
      - /actuator/**
      - /internal/**
      - /files/**
