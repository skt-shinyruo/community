spring:
  application:
    name: community-app-test
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: false
  datasource:
    url: jdbc:h2:mem:community;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    listener:
      auto-startup: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.nowcoder.community.infra.persistence.mybatis
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes
    issuer: community-auth

community:
  metrics:
    basic-auth:
      username: prometheus
      password: test-prometheus-pass-please-change

auth:
  refresh:
    store: db
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  password-reset:
    reset-base-url: http://localhost:8080
    store: redis
    ttl-seconds: 600
  registration:
    code:
      store: redis
      ttl-seconds: 600
      max-failures: 3
      resend-cooldown-seconds: 60
      expose-code: true
    draft:
      store: redis
      ttl-seconds: 1800
    mail:
      enabled: false
  login-rate-limit:
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

content:
  storage: redis
  events:
    publisher: ${CONTENT_EVENTS_PUBLISHER:outbox-kafka}
    outbox-topic: ${CONTENT_EVENTS_OUTBOX_TOPIC:eventbus.content}
    kafka-topic: ${CONTENT_EVENTS_KAFKA_TOPIC:content.events}
  score:
    refresh:
      enabled: false

events:
  outbox:
    enabled: true

social:
  storage: db
  events:
    publisher: ${SOCIAL_EVENTS_PUBLISHER:outbox-kafka}
    outbox-topic: ${SOCIAL_EVENTS_OUTBOX_TOPIC:eventbus.social}
    kafka-topic: ${SOCIAL_EVENTS_KAFKA_TOPIC:social.events}

notice:
  kafka:
    consumer:
      group-id: ${NOTICE_KAFKA_CONSUMER_GROUP_ID:notice-projection}
      concurrency: ${NOTICE_KAFKA_CONSUMER_CONCURRENCY:3}

user:
  events:
    publisher: ${USER_EVENTS_PUBLISHER:outbox-kafka}
    outbox-topic: ${USER_EVENTS_OUTBOX_TOPIC:eventbus.user}
    kafka-topic: ${USER_EVENTS_KAFKA_TOPIC:user.events}
  reward:
    kafka:
      consumer:
        group-id: ${USER_REWARD_KAFKA_CONSUMER_GROUP_ID:user-reward-projection}
        concurrency: ${USER_REWARD_KAFKA_CONSUMER_CONCURRENCY:3}

search:
  storage: es
  index:
    initialize: false
  kafka:
    consumer:
      group-id: ${SEARCH_KAFKA_CONSUMER_GROUP_ID:search-post-projection}
      concurrency: ${SEARCH_KAFKA_CONSUMER_CONCURRENCY:3}
  idempotency:
    cleanup-enabled: false
    retention-days: 1

analytics:
  max-days-range: 31
  ingest:
    enabled: false
    record-uv: true
    record-dau: true
    include-paths:
      - /api/posts/**
      - /api/search/**
      - /api/notices/**
    exclude-paths:
      - /api/analytics/**
      - /api/auth/**
      - /actuator/**
      - /internal/**
      - /files/**

clients:
  user:
    fail-open: true
  social:
    fail-open: true

http:
  idempotency:
    enabled: true
    store: DB

xxl:
  job:
    enabled: false

drive:
  share:
    ticket-secret: test-drive-share-ticket-secret
