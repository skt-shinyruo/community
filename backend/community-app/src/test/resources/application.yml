spring:
  application:
    name: community-app-test
  datasource:
    url: jdbc:h2:mem:community;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    listener:
      auto-startup: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.nowcoder.community.infra.persistence.mybatis
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes
    issuer: community-auth

community:
  metrics:
    basic-auth:
      username: prometheus
      password: test-prometheus-pass-please-change

auth:
  refresh:
    store: db
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  password-reset:
    reset-base-url: http://localhost:8080
    store: redis
    ttl-seconds: 600
  registration:
    pending-user:
      ttl-seconds: 1800
      cleanup-interval-ms: 300000
    code:
      store: redis
      ttl-seconds: 600
      max-failures: 3
      resend-cooldown-seconds: 60
      expose-code: true
    draft:
      store: redis
    mail:
      enabled: false
  login-rate-limit:
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

content:
  storage: redis
  events:
    publisher: local
  score:
    refresh:
      enabled: false

events:
  outbox:
    enabled: true

social:
  storage: db
  events:
    publisher: local

search:
  storage: es
  index:
    initialize: false
  idempotency:
    cleanup-enabled: false
    retention-days: 1

analytics:
  max-days-range: 31
  ingest:
    enabled: false
    record-uv: true
    record-dau: true
    include-paths:
      - /api/posts/**
      - /api/search/**
      - /api/messages/**
      - /api/notices/**
      - /api/im-governance/**
    exclude-paths:
      - /api/analytics/**
      - /api/auth/**
      - /actuator/**
      - /internal/**
      - /files/**

message:
  idempotency:
    cleanup-enabled: false
    retention-days: 1

clients:
  user:
    fail-open: true
  social:
    fail-open: true

http:
  idempotency:
    enabled: true
    store: DB

xxl:
  job:
    enabled: false
