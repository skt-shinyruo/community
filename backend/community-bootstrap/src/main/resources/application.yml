server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: community-app
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:${MYSQL_USER:community}}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD:communitypass}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://127.0.0.1:9200}

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    elasticsearch:
      enabled: true

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

security:
  jwt:
    # Dev default (>= 32 bytes). Production should override via env/secret store.
    hmac-secret: ${JWT_HMAC_SECRET:dev-jwt-hmac-secret-please-change-me-123456}
    issuer: community-auth
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    refresh-cookie-name: refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: ${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
    refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}

gateway:
  origin-guard:
    enabled: true
    allowed-origins:
      - http://localhost:5173
      - http://localhost:12881
      - http://localhost:12888
    # 生产建议 fail-closed：allowlist 漏配时拒绝敏感 cookie 会话入口（login/refresh/logout）。
    fail-open-when-allowlist-empty: false

auth:
  refresh:
    store: db
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  registration:
    activation-base-url: ${AUTH_ACTIVATION_BASE_URL:}
    expose-activation-link: ${AUTH_EXPOSE_ACTIVATION_LINK:true}
    mail:
      enabled: ${AUTH_MAIL_ENABLED:false}
      from: ${AUTH_MAIL_FROM:no-reply@community.local}
      subject: 激活账号
  password-reset:
    reset-base-url: ${AUTH_PASSWORD_RESET_BASE_URL:${AUTH_ACTIVATION_BASE_URL:}}
    store: redis
    ttl-seconds: 600
    expose-reset-link: ${AUTH_EXPOSE_RESET_LINK:true}
  login-rate-limit:
    enabled: true
    window-seconds: 60
    max-failures-per-ip: 20
    max-failures-per-user: 5
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

http:
  idempotency:
    enabled: true
    store: DB

content:
  storage: redis
  events:
    publisher: local
  score:
    refresh:
      enabled: true
      batch-size: 200

social:
  storage: db
  events:
    publisher: local

user:
  avatar:
    storage: ${USER_AVATAR_STORAGE:local}
    files-base-dir: ${USER_FILES_BASE_DIR:/tmp/community-files}
    public-base-url: ${USER_PUBLIC_BASE_URL:http://localhost:12881}
  social-profile:
    degrade-on-error: true

message:
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000

search:
  storage: es
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000
  index:
    prefix: community_posts_v
    keep-history: 2
  post-scan:
    page-size: 500

analytics:
  storage: redis
  max-days-range: 31

clients:
  user:
    fail-open: false
  social:
    fail-open: false
  content:
    fail-open: false

r2:
  endpoint: ${R2_ENDPOINT:}
  access-key: ${R2_ACCESS_KEY:}
  secret-key: ${R2_SECRET_KEY:}
  bucket-name: ${R2_BUCKET_NAME:}
  region: ${R2_REGION:auto}
  path-style: ${R2_PATH_STYLE:true}
