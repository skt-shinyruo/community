server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: community-gateway
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:${NACOS_SERVER_ADDR:localhost:8848}}

community:
  logging:
    service-version: ${SERVICE_VERSION:@project.version@}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:gateway-dev-jwt-hmac-secret-please-change-123456}
    issuer: ${JWT_ISSUER:community-auth}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

gateway:
  cors:
    allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:}
  http:
    routes:
      - id: bootstrap-api
        path-prefix: /api
        service-id: community-app
      - id: im-core
        path-prefix: /api/im
        service-id: im-core
      - id: bootstrap-files
        path-prefix: /files
        service-id: community-app
    rate-limit:
      enabled: true
      fail-open-on-error: true
      policies: {}
    traffic-policy:
      default-policy-id: baseline
      default-tags:
        plane: http
      rules: []
  ws:
    proxy:
      path: /ws/im
      auth-required: false
      default-worker-uri: ${IM_REALTIME_WS_BASE_URL:}
