spring:
  cloud:
    nacos:
      config:
        enabled: false
  datasource:
    url: jdbc:h2:mem:im_core_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: localhost:0
    listener:
      auto-startup: false

security:
  jwt:
    hmac-secret: im-core-test-jwt-secret-at-least-32b
    issuer: community-auth

events:
  outbox:
    enabled: false

im:
  room:
    max-members: 3
  room-member-change:
    publisher: noop
