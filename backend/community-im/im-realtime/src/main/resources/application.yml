spring:
  application:
    name: im-realtime
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:${NACOS_SERVER_ADDR:localhost:8848}}
        service: ${IM_REALTIME_WORKER_SERVICE_ID:im-realtime-worker}
        metadata:
          role: ws-worker
          wsPath: ${IM_INTERNAL_WORKER_WS_PATH:/internal/ws/im}
          wsPort: ${SERVER_PORT:18081}
          workerId: ${IM_REALTIME_WORKER_ID:${HOSTNAME:local}}
  kafka:
    # Comma-separated broker list, for example kafka-1:9092,kafka-2:9092,kafka-3:9092.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${IM_REALTIME_CONSUMER_GROUP:im-realtime-${HOSTNAME:local}}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.nowcoder.community.im.common.*
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        metadata.max.age.ms: ${IM_KAFKA_PRODUCER_METADATA_MAX_AGE_MS:1000}
        reconnect.backoff.ms: ${IM_KAFKA_PRODUCER_RECONNECT_BACKOFF_MS:100}
        reconnect.backoff.max.ms: ${IM_KAFKA_PRODUCER_RECONNECT_BACKOFF_MAX_MS:1000}
        request.timeout.ms: ${IM_KAFKA_PRODUCER_REQUEST_TIMEOUT_MS:3000}
        delivery.timeout.ms: ${IM_KAFKA_PRODUCER_DELIVERY_TIMEOUT_MS:5000}
        max.block.ms: ${IM_KAFKA_PRODUCER_MAX_BLOCK_MS:5000}

server:
  port: ${SERVER_PORT:18081}

community:
  logging:
    service-version: ${SERVICE_VERSION:@project.version@}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:im-realtime-dev-jwt-hmac-secret-please-change-123456}
    issuer: ${JWT_ISSUER:community-auth}

im:
  edge:
    mode: ${IM_EDGE_MODE:direct-public-edge}
    direct-public:
      ws-path: ${IM_DIRECT_PUBLIC_WS_PATH:/ws/im}
    internal-worker:
      ws-path: ${IM_INTERNAL_WORKER_WS_PATH:/internal/ws/im}
  clients:
    community-service-id: ${IM_COMMUNITY_SERVICE_ID:community-app}
    im-core-service-id: ${IM_CORE_SERVICE_ID:im-core}
  community:
    timeout-ms: ${IM_COMMUNITY_TIMEOUT_MS:1500}
  kafka:
    event:
      concurrency: ${IM_REALTIME_KAFKA_EVENT_CONCURRENCY:3}
  ws:
    # Single bind path for the current handler implementation. Public edge keeps /ws/im;
    # internal worker mode should bind /internal/ws/im and let community-gateway stay public.
    path: ${IM_WS_PATH:${IM_DIRECT_PUBLIC_WS_PATH:/ws/im}}
    outbound-buffer-size: ${IM_WS_OUTBOUND_BUFFER_SIZE:256}
    kafka-send-timeout-ms: ${IM_WS_KAFKA_SEND_TIMEOUT_MS:5000}
    room-flush-interval-ms: ${IM_ROOM_FLUSH_INTERVAL_MS:100}
  cors:
    allowed-origins: ${IM_CORS_ALLOWED_ORIGINS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
