spring:
  config:
    import:
      - ${NACOS_CONFIG_IMPORT_SHARED:optional:nacos:community-shared.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
      - ${NACOS_CONFIG_IMPORT_SERVICE:optional:nacos:im-realtime.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
      - ${NACOS_CONFIG_IMPORT_FEATURE_FLAGS:optional:nacos:community-feature-flags.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
      - ${NACOS_CONFIG_IMPORT_DEGRADATION:optional:nacos:community-degradation.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
      - ${NACOS_CONFIG_IMPORT_CACHE_POLICY:optional:nacos:community-cache-policy.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
      - ${NACOS_CONFIG_IMPORT_KAFKA_POLICY:optional:nacos:community-kafka-policy.yaml?group=${NACOS_CONFIG_GROUP:COMMUNITY}}
  application:
    name: im-realtime
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:${NACOS_SERVER_ADDR:localhost:8848}}
        service: ${im.session.worker-service-id:im-realtime-worker}
        metadata:
          version: ${SERVICE_VERSION:@project.version@}
          deployment.environment: ${DEPLOYMENT_ENVIRONMENT:local}
          zone: ${SERVICE_ZONE:local}
          traffic.group: ${SERVICE_TRAFFIC_GROUP:baseline}
          release.track: ${SERVICE_RELEASE_TRACK:stable}
          weight: ${SERVICE_WEIGHT:100}
          protocol: http
          capabilities: ${SERVICE_CAPABILITIES:}
          management.port: ${MANAGEMENT_SERVER_PORT:${SERVER_PORT}}
          draining: ${im.realtime.worker.drain-enabled:${SERVICE_DRAINING:false}}
          role: ws-worker
          wsPath: ${im.ws.path:/internal/ws/im}
          wsPort: ${SERVER_PORT:18081}
          workerId: ${IM_REALTIME_WORKER_ID:${HOSTNAME:local}}
          roomFanoutInboxSlot: ${im.room-fanout.worker-inbox-slot}
          maxConnections: ${im.realtime.worker.max-connections:${IM_REALTIME_MAX_CONNECTIONS:10000}}
          activeConnectionHint: ${im.realtime.worker.active-connection-hint:${IM_REALTIME_ACTIVE_CONNECTION_HINT:0}}
          shardGroup: ${im.realtime.worker.shard-group:${IM_REALTIME_SHARD_GROUP:default}}
          capacityWeight: ${im.realtime.worker.capacity-weight:${SERVICE_WEIGHT:100}}
      config:
        server-addr: ${SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR:${NACOS_SERVER_ADDR:localhost:8848}}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_CONFIG_GROUP:COMMUNITY}
        file-extension: yaml
  kafka:
    # Comma-separated broker list, for example kafka-1:9092,kafka-2:9092,kafka-3:9092.
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${IM_REALTIME_CONSUMER_GROUP:${im.kafka.consumer.group-id:im-realtime-${IM_REALTIME_WORKER_ID:${HOSTNAME:local}}}}
      auto-offset-reset: ${IM_REALTIME_KAFKA_CONSUMER_AUTO_OFFSET_RESET:${im.kafka.consumer.auto-offset-reset:latest}}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: com.nowcoder.community.im.common.*
    producer:
      acks: ${community.kafka-policy.producer.acks:all}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
        enable.idempotence: ${community.kafka-policy.producer.enable-idempotence:true}
        max.in.flight.requests.per.connection: ${community.kafka-policy.producer.max-in-flight-requests:5}
        metadata.max.age.ms: ${community.kafka-policy.producer.metadata-max-age-ms:1000}
        reconnect.backoff.ms: ${community.kafka-policy.producer.reconnect-backoff-ms:100}
        reconnect.backoff.max.ms: ${community.kafka-policy.producer.reconnect-backoff-max-ms:1000}
        request.timeout.ms: ${community.kafka-policy.producer.request-timeout-ms:3000}
        delivery.timeout.ms: ${community.kafka-policy.producer.delivery-timeout-ms:5000}
        max.block.ms: ${community.kafka-policy.producer.max-block-ms:5000}

server:
  port: ${SERVER_PORT:18081}

community:
  logging:
    service-version: ${SERVICE_VERSION:@project.version@}
  observability:
    runtime-logging:
      enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_LOGGING_ENABLED:true}
      startup-summary-enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_STARTUP_SUMMARY_ENABLED:true}
      periodic-summary-enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_PERIODIC_SUMMARY_ENABLED:true}
      periodic-summary-interval: ${COMMUNITY_OBSERVABILITY_RUNTIME_PERIODIC_SUMMARY_INTERVAL:60s}
      jvm:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_ENABLED:true}
        memory-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_MEMORY_THRESHOLD_PERCENT:85}
        gc-pause-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_GC_PAUSE_THRESHOLD_MS:200}
        direct-memory-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_JVM_DIRECT_MEMORY_THRESHOLD_PERCENT:85}
      executors:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_EXECUTORS_ENABLED:true}
        saturation-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_EXECUTORS_SATURATION_THRESHOLD_PERCENT:85}
      kafka:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_KAFKA_ENABLED:true}
        consumer-lag-threshold: ${COMMUNITY_OBSERVABILITY_RUNTIME_KAFKA_CONSUMER_LAG_THRESHOLD:1000}
      http-client:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_HTTP_CLIENT_ENABLED:true}
        slow-request-threshold-ms: ${COMMUNITY_OBSERVABILITY_RUNTIME_HTTP_CLIENT_SLOW_REQUEST_THRESHOLD_MS:1000}
      logging-system:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_LOGGING_SYSTEM_ENABLED:true}
        queue-pressure-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_LOGGING_SYSTEM_QUEUE_PRESSURE_THRESHOLD_PERCENT:80}
      system:
        enabled: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_ENABLED:true}
        fd-usage-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_FD_USAGE_THRESHOLD_PERCENT:80}
        disk-usage-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_DISK_USAGE_THRESHOLD_PERCENT:90}
        cpu-load-threshold-percent: ${COMMUNITY_OBSERVABILITY_RUNTIME_SYSTEM_CPU_LOAD_THRESHOLD_PERCENT:85}

security:
  jwt:
    # Required (>= 32 bytes). Set JWT_HMAC_SECRET via env/secret store.
    hmac-secret: ${JWT_HMAC_SECRET:}
    issuer: ${JWT_ISSUER:community-auth}

im:
  clients:
    community-service-id: ${IM_COMMUNITY_SERVICE_ID:community-app}
    im-core-service-id: ${IM_CORE_SERVICE_ID:im-core}
    membership-snapshot-service-id: ${IM_MEMBERSHIP_SNAPSHOT_SERVICE_ID:${IM_CORE_SERVICE_ID:im-core}}
    policy-snapshot-service-id: ${IM_POLICY_SNAPSHOT_SERVICE_ID:${IM_COMMUNITY_SERVICE_ID:community-app}}
    snapshot-timeout-ms: ${IM_SNAPSHOT_TIMEOUT_MS:3000}
    internal-scope: ${IM_INTERNAL_SCOPE:im.realtime.internal}
  community:
    timeout-ms: ${IM_COMMUNITY_TIMEOUT_MS:1500}
  projection:
    bootstrap-on-startup: ${IM_PROJECTION_BOOTSTRAP_ON_STARTUP:true}
  room-presence:
    key-prefix: "${IM_ROOM_PRESENCE_KEY_PREFIX:im:}"
    ttl: ${IM_ROOM_PRESENCE_TTL:PT30S}
    heartbeat-interval: ${IM_ROOM_PRESENCE_HEARTBEAT_INTERVAL:PT10S}
  room-fanout:
    owner-group-id: ${IM_ROOM_FANOUT_OWNER_GROUP_ID:im-realtime-room-fanout-owner}
    owner-concurrency: ${IM_ROOM_FANOUT_OWNER_CONCURRENCY:${IM_REALTIME_KAFKA_EVENT_CONCURRENCY:3}}
    routed-command-topic: ${IM_ROOM_FANOUT_ROUTED_COMMAND_TOPIC:im.command.room-fanout-routed}
    routed-command-partitions: 64
    worker-inbox-slot: ${IM_ROOM_FANOUT_WORKER_INBOX_SLOT}
    worker-inbox-slot-metadata-key: ${IM_ROOM_FANOUT_WORKER_INBOX_SLOT_METADATA_KEY:roomFanoutInboxSlot}
    publish-timeout: ${IM_ROOM_FANOUT_PUBLISH_TIMEOUT:PT1S}
    worker-directory-cache-ttl: ${IM_ROOM_FANOUT_WORKER_DIRECTORY_CACHE_TTL:PT0.5S}
  session:
    # Worker-local ticket and identity settings used to validate connect tickets.
    # Public session bootstrap routing moved to community-im-gateway.
    worker-service-id: ${IM_REALTIME_WORKER_SERVICE_ID:im-realtime-worker}
    worker-id: ${IM_REALTIME_WORKER_ID:${HOSTNAME:local}}
    ws-base-url: "${IM_SESSION_WS_BASE_URL:ws://127.0.0.1:${SERVER_PORT:18081}${im.ws.path:/internal/ws/im}}"
    ticket-ttl: ${IM_SESSION_TICKET_TTL:PT2M}
    worker-id-metadata-key: ${IM_SESSION_WORKER_ID_METADATA_KEY:workerId}
    ws-path-metadata-key: ${IM_SESSION_WS_PATH_METADATA_KEY:wsPath}
    ws-port-metadata-key: ${IM_SESSION_WS_PORT_METADATA_KEY:wsPort}
  kafka:
    event:
      concurrency: ${IM_REALTIME_KAFKA_EVENT_CONCURRENCY:3}
  ws:
    path: ${IM_WS_PATH:/internal/ws/im}
    outbound-buffer-size: ${IM_WS_OUTBOUND_BUFFER_SIZE:256}
    kafka-send-timeout-ms: ${IM_WS_KAFKA_SEND_TIMEOUT_MS:5000}
    room-flush-interval-ms: ${IM_ROOM_FLUSH_INTERVAL_MS:100}
  cors:
    allowed-origins: ${IM_CORS_ALLOWED_ORIGINS:}
  realtime:
    worker:
      max-connections: ${IM_REALTIME_MAX_CONNECTIONS:10000}
      active-connection-hint: ${IM_REALTIME_ACTIVE_CONNECTION_HINT:0}
      drain-enabled: ${SERVICE_DRAINING:false}
      shard-group: ${IM_REALTIME_SHARD_GROUP:default}
      capacity-weight: ${SERVICE_WEIGHT:100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
