services:
  # 对外暴露 backend（浏览器直连）
  community-app:
    ports:
      - "12882:8080"
    environment:
      # 直连模式下，激活链接应指向前端端口（如启用“暴露激活链接”功能）
      AUTH_ACTIVATION_BASE_URL: http://localhost:12881

  # 前端独立容器：Vite build + preview（无 Nginx）
  frontend:
    build:
      # frontend 不在 backend/ 内，build context 需回到仓库根目录
      context: ../..
      dockerfile: backend/deploy/Dockerfile.frontend
    container_name: community-frontend
    ports:
      - "12881:12881"
    depends_on:
      - community-app
