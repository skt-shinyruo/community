spring:
  datasource:
    url: ${SEARCH_DB_URL:jdbc:mysql://mysql:3306/community_search?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SEARCH_DB_USERNAME:community_search}
    password: ${SEARCH_DB_PASSWORD:community_searchpass}
  data:
    redis:
      host: ${SEARCH_REDIS_HOST:redis}
      port: ${SEARCH_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://elasticsearch:9200}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET}

search:
  # SSOT：生产/默认使用 Elasticsearch；仅测试/演示可显式覆盖为 memory（并关闭 ES 依赖）。
  storage: es
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000
  index:
    prefix: community_posts_v
    keep-history: 2
  content-client:
    base-url: ${CONTENT_SERVICE_BASE_URL:http://content-service:8088}
