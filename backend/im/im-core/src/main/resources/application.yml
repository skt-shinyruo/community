spring:
  application:
    name: im-core
  datasource:
    url: ${IM_CORE_DB_URL:jdbc:mysql://localhost:3306/im_core?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${IM_CORE_DB_USER:im_core}
    password: ${IM_CORE_DB_PASSWORD:imcorepass}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${IM_CORE_CONSUMER_GROUP:im-core}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.nowcoder.community.im.contracts.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true

server:
  port: 18082

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:}

im:
  kafka:
    command:
      concurrency: ${IM_CORE_KAFKA_COMMAND_CONCURRENCY:3}
  room:
    max-members: ${IM_ROOM_MAX_MEMBERS:10000}
  room-member-change:
    publisher: ${IM_ROOM_MEMBER_CHANGE_PUBLISHER:kafka}
  cors:
    allowed-origins: ${IM_CORS_ALLOWED_ORIGINS:http://localhost:12881,http://127.0.0.1:12881,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
