search:
  storage: memory
  idempotency:
    cleanup-enabled: false
    retention-days: 1

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

community:
  metrics:
    basic-auth:
      username: prometheus
      password: test-prometheus-pass-please-change

spring:
  application:
    name: search-service
  kafka:
    listener:
      auto-startup: false
  datasource:
    url: jdbc:h2:mem:search;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
