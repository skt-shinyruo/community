social:
  storage: memory
  events:
    publisher: memory

spring:
  application:
    name: social-service
  datasource:
    url: jdbc:h2:mem:social;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

community:
  metrics:
    basic-auth:
      username: prometheus
      password: test-prometheus-pass-please-change

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
