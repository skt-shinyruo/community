spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  kafka:
    listener:
      auto-startup: false
  datasource:
    url: jdbc:h2:mem:user;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.user.entity
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

community:
  metrics:
    basic-auth:
      username: prometheus
      password: test-prometheus-pass-please-change

qiniu:
  key:
    access: test-ak
    secret: test-sk
  bucket:
    header:
      name: test-bucket
      url: http://bucket.local

user:
  events:
    publisher: memory

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    address: N/A
  protocol:
    name: dubbo
    port: -1
  consumer:
    check: false
    init: false
    lazy: true
    retries: 0
    timeout: 3000
  provider:
    timeout: 3000
