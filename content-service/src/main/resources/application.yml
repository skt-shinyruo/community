server:
  port: 8088

content:
  storage: redis
  events:
    publisher: kafka
    outbox:
      enabled: true
      relay-enabled: true
      # MySQL 8+ 推荐开启：多实例 relay 并发认领时避免头阻塞（不支持可关闭回退）。
      claim-skip-locked-enabled: true
      batch-size: 200
      max-retries: 10
      base-delay-ms: 1000
      max-delay-ms: 60000
      relay-interval-ms: 5000
      send-timeout-ms: 3000
  score:
    refresh:
      enabled: true
      batch-size: 200

spring:
  application:
    name: content-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: ${CONTENT_DB_URL:jdbc:mysql://127.0.0.1:3306/community_content?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${CONTENT_DB_USERNAME:${MYSQL_USER:}}
    password: ${CONTENT_DB_PASSWORD:${MYSQL_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${CONTENT_REDIS_HOST:127.0.0.1}
      port: ${CONTENT_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: content-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: manual
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.content.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:${AUTH_JWT_HMAC_SECRET:}}

clients:
  user:
    base-url: ${USER_SERVICE_BASE_URL:http://user-service}
    fail-open: false
  social:
    base-url: ${SOCIAL_SERVICE_BASE_URL:http://social-service}
    fail-open: false
