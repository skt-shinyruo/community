content:
  storage: memory
  events:
    publisher: memory
  score:
    refresh:
      enabled: false

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  kafka:
    listener:
      auto-startup: false
  datasource:
    url: jdbc:h2:mem:content;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.content.entity
  configuration:
    map-underscore-to-camel-case: true
