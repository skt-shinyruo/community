services:
  elasticsearch-1:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    mem_limit: ${ELASTICSEARCH_MEM_LIMIT:-1g}
    environment:
    - node.name=elasticsearch-1
    - cluster.name=community-es
    - discovery.seed_hosts=elasticsearch-1,elasticsearch-2,elasticsearch-3
    - cluster.initial_master_nodes=elasticsearch-1,elasticsearch-2,elasticsearch-3
    - xpack.security.enabled=false
    - bootstrap.memory_lock=true
    - ES_JAVA_OPTS=${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
    - elasticsearch_node_1_data:/usr/share/elasticsearch/data
    networks:
      default:
        aliases:
        - elasticsearch
  elasticsearch-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    mem_limit: ${ELASTICSEARCH_MEM_LIMIT:-1g}
    environment:
    - node.name=elasticsearch-2
    - cluster.name=community-es
    - discovery.seed_hosts=elasticsearch-1,elasticsearch-2,elasticsearch-3
    - cluster.initial_master_nodes=elasticsearch-1,elasticsearch-2,elasticsearch-3
    - xpack.security.enabled=false
    - bootstrap.memory_lock=true
    - ES_JAVA_OPTS=${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
    - elasticsearch_node_2_data:/usr/share/elasticsearch/data
  elasticsearch-3:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    mem_limit: ${ELASTICSEARCH_MEM_LIMIT:-1g}
    environment:
    - node.name=elasticsearch-3
    - cluster.name=community-es
    - discovery.seed_hosts=elasticsearch-1,elasticsearch-2,elasticsearch-3
    - cluster.initial_master_nodes=elasticsearch-1,elasticsearch-2,elasticsearch-3
    - xpack.security.enabled=false
    - bootstrap.memory_lock=true
    - ES_JAVA_OPTS=${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
    - elasticsearch_node_3_data:/usr/share/elasticsearch/data
  es-init:
    image: curlimages/curl:8.6.0
    mem_limit: ${ES_INIT_MEM_LIMIT:-64m}
    depends_on:
      elasticsearch-1:
        condition: service_started
      elasticsearch-2:
        condition: service_started
      elasticsearch-3:
        condition: service_started
    command: "sh -c ' set -e; echo \"[es-init] waiting for elasticsearch cluster...\"; until curl -fsS \"http://elasticsearch:9200/_cluster/health?wait_for_status=yellow&timeout=120s\" >/dev/null 2>&1; do sleep 2; done; echo \"[es-init] done.\" '\n"
    restart: 'no'
