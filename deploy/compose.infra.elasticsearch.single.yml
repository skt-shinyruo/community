services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    mem_limit: ${ELASTICSEARCH_MEM_LIMIT:-1g}
    environment:
    - node.name=elasticsearch
    - cluster.name=community-es-dev
    - discovery.type=single-node
    - xpack.security.enabled=false
    - bootstrap.memory_lock=true
    - ES_JAVA_OPTS=${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
    - elasticsearch_node_1_data:/usr/share/elasticsearch/data
    networks:
      default:
        aliases:
        - elasticsearch
        - elasticsearch-1
  es-init:
    image: curlimages/curl:8.6.0
    mem_limit: ${ES_INIT_MEM_LIMIT:-64m}
    depends_on:
      elasticsearch:
        condition: service_started
    command: "sh -c ' set -e; echo \"[es-init] waiting for elasticsearch cluster...\"; until curl -fsS \"http://elasticsearch:9200/_cluster/health?wait_for_status=yellow&timeout=120s\" >/dev/null 2>&1; do sleep 2; done; code=$$(curl -s -o /dev/null -w \"%{http_code}\" http://elasticsearch:9200/community_posts); if [ \"$$code\" = \"404\" ]; then\n  echo \"[es-init] creating index community_posts...\";\n  curl -fsS -X PUT http://elasticsearch:9200/community_posts -H \"Content-Type: application/json\" -d \"{\\\"settings\\\":{\\\"number_of_shards\\\":1,\\\"number_of_replicas\\\":0}}\";\nelse\n  echo \"[es-init] index community_posts already exists (code=$$code)\";\nfi; echo \"[es-init] done.\" '\n"
    restart: 'no'
