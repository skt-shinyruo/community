services:
  garage:
    image: ${GARAGE_IMAGE:-dxflrs/garage:v2.2.0}
    mem_limit: ${GARAGE_MEM_LIMIT:-512m}
    command:
    - /garage
    - server
    - --single-node
    - --default-bucket
    environment:
    - GARAGE_CONFIG_FILE=/etc/garage.toml
    - GARAGE_DEFAULT_ACCESS_KEY=${GARAGE_DEFAULT_ACCESS_KEY:-communityosskey}
    - GARAGE_DEFAULT_SECRET_KEY=${GARAGE_DEFAULT_SECRET_KEY:-communityosssecret}
    - GARAGE_DEFAULT_BUCKET=${GARAGE_DEFAULT_BUCKET:-community-oss}
    - GARAGE_REPLICATION_FACTOR=1
    - RUST_LOG=${GARAGE_RUST_LOG:-garage=info}
    volumes:
    - garage_data:/var/lib/garage
    - ./garage/garage.single.toml:/etc/garage.toml:ro
    ports:
    - "${GARAGE_S3_HOST_PORT:-13900}:3900"
    - "${GARAGE_ADMIN_HOST_PORT:-13903}:3903"
    healthcheck:
      test:
      - CMD-SHELL
      - /garage status >/dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      default:
        aliases:
        - garage
