    mem_limit: ${REDIS_BOOTSTRAP_MEM_LIMIT:-96m}
    entrypoint:
    - /bin/sh
    - /bootstrap-redis-cluster.sh
    environment:
    - REDIS_CLUSTER_NODES=${SPRING_DATA_REDIS_CLUSTER_NODES:-redis-1:6379,redis-2:6379,redis-3:6379,redis-4:6379,redis-5:6379,redis-6:6379}
    volumes:
    - ./scripts/bootstrap-redis-cluster.sh:/bootstrap-redis-cluster.sh:ro
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-4:
        condition: service_healthy
      redis-5:
        condition: service_healthy
      redis-6:
        condition: service_healthy
    restart: 'no'
