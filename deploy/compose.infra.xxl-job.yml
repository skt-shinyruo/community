services:
  xxl-job-admin-1:
    image: xuxueli/xxl-job-admin:3.3.2
    mem_limit: ${XXL_JOB_ADMIN_MEM_LIMIT:-384m}
    environment:
    - JAVA_TOOL_OPTIONS=${XXL_JOB_ADMIN_JAVA_TOOL_OPTIONS:--XX:+UseG1GC -XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0 -XX:MaxMetaspaceSize=192m -XX:+ExitOnOutOfMemoryError}
    - PARAMS=--spring.datasource.url=jdbc:mysql://${DB_PRIMARY_HOST:-mysql-primary}:3306/xxl_job?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true --spring.datasource.username=${XXL_JOB_MYSQL_USER:-xxl_job} --spring.datasource.password=${XXL_JOB_MYSQL_PASSWORD:-xxljobpass} --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
    depends_on:
      mysql-primary:
        condition: service_healthy
    networks:
      default:
        aliases:
        - xxl-job-admin
  xxl-job-admin-2:
    image: xuxueli/xxl-job-admin:3.3.2
    mem_limit: ${XXL_JOB_ADMIN_MEM_LIMIT:-384m}
    environment:
    - JAVA_TOOL_OPTIONS=${XXL_JOB_ADMIN_JAVA_TOOL_OPTIONS:--XX:+UseG1GC -XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0 -XX:MaxMetaspaceSize=192m -XX:+ExitOnOutOfMemoryError}
    - PARAMS=--spring.datasource.url=jdbc:mysql://${DB_PRIMARY_HOST:-mysql-primary}:3306/xxl_job?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true --spring.datasource.username=${XXL_JOB_MYSQL_USER:-xxl_job} --spring.datasource.password=${XXL_JOB_MYSQL_PASSWORD:-xxljobpass} --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
    depends_on:
      mysql-primary:
        condition: service_healthy
