x-community-gateway-base: &community-gateway-base
  build:
    context: ../backend
    dockerfile: ../deploy/Dockerfile.backend-service
    args:
      MODULE: community-gateway
      OTEL_JAVA_AGENT_VERSION: ${OTEL_JAVA_AGENT_VERSION:-2.23.0}
  mem_limit: ${COMMUNITY_GATEWAY_MEM_LIMIT:-512m}
  volumes:
  - observability_logs:/var/log/community


services:
  community-gateway-1:
    <<: *community-gateway-base
    environment:
    - SERVER_PORT=8080
    - OTEL_ENABLED=${OTEL_ENABLED:-false}
    - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability-gateway-edot-collector:4318}
    - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
    - OTEL_SERVICE_NAME=community-gateway
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local-compose
    - SERVICE_VERSION=${SERVICE_VERSION:-local-compose}
    - JAVA_OPTS=${COMMUNITY_GATEWAY_JAVA_OPTS:--XX:+UseG1GC -XX:+UseStringDeduplication -XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=55.0 -XX:MaxMetaspaceSize=192m -XX:+ExitOnOutOfMemoryError}
    - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev},volume-log-export
    - COMMUNITY_LOGGING_DIR=/var/log/community
    - COMMUNITY_LOGGING_FILE_NAME=community-gateway-1.json.log
    - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
    - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
    - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-}
    - GATEWAY_CORS_ALLOWED_ORIGINS=${BROWSER_ALLOWED_ORIGINS:?BROWSER_ALLOWED_ORIGINS is required}
    - GATEWAY_WS_PROXY_AUTH_REQUIRED=true
    - IM_REALTIME_WS_BASE_URL=ws://im-realtime-1:18081${IM_INTERNAL_WORKER_WS_PATH:-/internal/ws/im}
    depends_on:
      nacos-db-bootstrap:
        condition: service_completed_successfully
      nacos-1:
        condition: service_started
      community-app-1:
        condition: service_started
      im-core-1:
        condition: service_started
      im-realtime-1:
        condition: service_started
    networks:
      default:
        aliases:
        - community-gateway
  community-gateway-2:
    <<: *community-gateway-base
    environment:
    - SERVER_PORT=8080
    - OTEL_ENABLED=${OTEL_ENABLED:-false}
