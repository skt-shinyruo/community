services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    mem_limit: ${FRONTEND_MEM_LIMIT:-256m}
    environment:
    - VITE_PREVIEW_PROXY_TARGET=http://nginx:8080
    - GATEWAY_PUBLIC_BASE_URL=${GATEWAY_PUBLIC_BASE_URL:?GATEWAY_PUBLIC_BASE_URL is required}
    ports:
    - ${FRONTEND_HOST_PORT:-12881}:12881
    depends_on:
      nginx:
        condition: service_started
  nginx:
    image: nginx:1.27-alpine
    mem_limit: ${NGINX_MEM_LIMIT:-128m}
    depends_on:
      community-gateway-1:
        condition: service_started
      community-gateway-2:
        condition: service_started
      community-gateway-3:
        condition: service_started
      xxl-job-admin-1:
        condition: service_started
      xxl-job-admin-2:
        condition: service_started
    volumes:
    - ./nginx/nginx.cluster.conf:/etc/nginx/nginx.conf:ro
    ports:
    - ${NGINX_API_PORT:-12880}:8080
    - 127.0.0.1:${NGINX_XXL_JOB_PORT:-12887}:8081
