services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    mem_limit: ${FRONTEND_MEM_LIMIT:-256m}
    environment:
    - VITE_PREVIEW_PROXY_TARGET=http://nginx:8080
    - GATEWAY_PUBLIC_BASE_URL=${GATEWAY_PUBLIC_BASE_URL:?GATEWAY_PUBLIC_BASE_URL is required}
    ports:
    - ${FRONTEND_HOST_PORT:-12881}:12881
    depends_on:
      nginx:
        condition: service_started
  nginx:
    image: nginx:1.27-alpine
    mem_limit: ${NGINX_MEM_LIMIT:-128m}
    environment:
    - NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-10g}
    depends_on:
      community-gateway:
        condition: service_healthy
      xxl-job-admin:
        condition: service_started
    volumes:
    - ./nginx/nginx.single.conf:/etc/nginx/templates/default.conf.template:ro
    ports:
    - ${NGINX_API_PORT:-12880}:8080
    - 127.0.0.1:${NGINX_XXL_JOB_PORT:-12887}:8081
    networks:
      default:
        ipv4_address: ${NGINX_STATIC_IP:?NGINX_STATIC_IP is required}
