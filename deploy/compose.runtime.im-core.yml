x-im-core-base: &im-core-base
  build:
    context: ../backend
    dockerfile: ../deploy/Dockerfile.backend-service
    args:
      MODULE: im-core
      OTEL_JAVA_AGENT_VERSION: ${OTEL_JAVA_AGENT_VERSION:-2.23.0}
  mem_limit: ${IM_CORE_MEM_LIMIT:-640m}
  volumes:
  - observability_logs:/var/log/community


services:
  im-core-1:
    <<: *im-core-base
    environment:
    - SERVER_PORT=18082
    - OTEL_ENABLED=${OTEL_ENABLED:-false}
    - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability-gateway-edot-collector:4318}
    - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
    - OTEL_SERVICE_NAME=im-core
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local-compose
    - SERVICE_VERSION=${SERVICE_VERSION:-local-compose}
    - JAVA_OPTS=${IM_CORE_JAVA_OPTS:--XX:+UseG1GC -XX:+UseStringDeduplication -XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0 -XX:MaxMetaspaceSize=192m -XX:+ExitOnOutOfMemoryError}
    - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev},volume-log-export
    - COMMUNITY_LOGGING_DIR=/var/log/community
    - COMMUNITY_LOGGING_FILE_NAME=im-core-1.json.log
    - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
    - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka-1:9092,kafka-2:9092,kafka-3:9092}
    - IM_CORE_DB_PRIMARY_HOST=${IM_CORE_DB_PRIMARY_HOST:-mysql-primary}
    - IM_CORE_DB_URL=jdbc:mysql://${IM_CORE_DB_PRIMARY_HOST:-mysql-primary}:3306/${IM_MYSQL_DATABASE:-im_core}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    - IM_CORE_DB_USER=${IM_MYSQL_USER:-im_core}
    - IM_CORE_DB_PASSWORD=${IM_MYSQL_PASSWORD:-imcorepass}
    - IM_CORS_ALLOWED_ORIGINS=${IM_CORS_ALLOWED_ORIGINS:-http://localhost:12881,http://127.0.0.1:12881,http://localhost:5173}
    depends_on:
      nacos-db-bootstrap:
        condition: service_completed_successfully
      nacos-1:
        condition: service_started
      mysql-primary:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
        - im-core
