x-im-realtime-base: &im-realtime-base
  build:
    context: ../backend
    dockerfile: ../deploy/Dockerfile.backend-service
    args:
      MODULE: im-realtime
      OTEL_JAVA_AGENT_VERSION: ${OTEL_JAVA_AGENT_VERSION:-2.23.0}
  mem_limit: ${IM_REALTIME_MEM_LIMIT:-640m}
  volumes:
  - observability_logs:/var/log/community

services:
  im-realtime-1:
    <<: *im-realtime-base
    environment:
    - SERVER_PORT=18081
    - OTEL_ENABLED=${OTEL_ENABLED:-false}
    - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability-gateway-edot-collector:4318}
    - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
    - OTEL_SERVICE_NAME=im-realtime
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local-compose
    - SERVICE_VERSION=${SERVICE_VERSION:-local-compose}
    - JAVA_OPTS=${IM_REALTIME_JAVA_OPTS:--XX:+UseG1GC -XX:+UseStringDeduplication -XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=55.0 -XX:MaxMetaspaceSize=192m -XX:+ExitOnOutOfMemoryError}
    - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev},volume-log-export
    - COMMUNITY_LOGGING_DIR=/var/log/community
    - COMMUNITY_LOGGING_FILE_NAME=im-realtime-1.json.log
    - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
    - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka-1:9092,kafka-2:9092,kafka-3:9092}
    - IM_REALTIME_CONSUMER_GROUP=im-realtime-1
    - IM_EDGE_MODE=internal-worker
    - IM_WS_PATH=${IM_INTERNAL_WORKER_WS_PATH:-/internal/ws/im}
    - IM_CORE_SERVICE_ID=${IM_CORE_SERVICE_ID:-im-core}
    - IM_COMMUNITY_SERVICE_ID=${IM_COMMUNITY_SERVICE_ID:-community-app}
    - IM_REALTIME_WORKER_SERVICE_ID=${IM_REALTIME_WORKER_SERVICE_ID:-im-realtime-worker}
    - IM_REALTIME_WORKER_ID=${IM_REALTIME_WORKER_ID_PREFIX:-im-realtime}-1
    - IM_ROOM_FLUSH_INTERVAL_MS=${IM_ROOM_FLUSH_INTERVAL_MS:-50}
    - IM_WS_OUTBOUND_BUFFER_SIZE=${IM_WS_OUTBOUND_BUFFER_SIZE:-256}
    - IM_CORS_ALLOWED_ORIGINS=${BROWSER_ALLOWED_ORIGINS:?BROWSER_ALLOWED_ORIGINS is required}
    depends_on:
      nacos-db-bootstrap:
        condition: service_completed_successfully
      nacos-1:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
      im-core-1:
        condition: service_started
    networks:
      default:
        aliases:
        - im-realtime
  im-realtime-2:
