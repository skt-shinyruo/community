    - RUNTIME_DIAGNOSTICS_MAX_EVENTS_PER_SECOND=${RUNTIME_DIAGNOSTICS_MAX_EVENTS_PER_SECOND:-20}
    - RUNTIME_DIAGNOSTICS_MAX_TRACKED_KEYS=${RUNTIME_DIAGNOSTICS_MAX_TRACKED_KEYS:-10000}
    - JAVA_OPTS=${COMMUNITY_APP_JAVA_OPTS:--XX:+UseG1GC -XX:+UseStringDeduplication -XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0 -XX:MaxMetaspaceSize=256m -XX:+ExitOnOutOfMemoryError}
    - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev},redis-cluster,json-logs
    - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
    - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
