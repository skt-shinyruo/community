    - NACOS_CONFIG_GROUP=${NACOS_CONFIG_GROUP:-COMMUNITY}
    - NACOS_NAMESPACE=${NACOS_NAMESPACE:-}
    - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
    - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:?METRICS_BASIC_AUTH_PASSWORD is required}
    - DB_PRIMARY_HOST=${DB_PRIMARY_HOST:-mysql-primary}
    - DB_URL=jdbc:mysql://${DB_PRIMARY_HOST:-mysql-primary}:3306/${MYSQL_DATABASE:-community}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    - DB_USERNAME=${MYSQL_USER:-community}
    - DB_PASSWORD=${MYSQL_PASSWORD:-communitypass}
    - SPRING_DATA_REDIS_CLUSTER_NODES=${SPRING_DATA_REDIS_CLUSTER_NODES:-redis-1:6379,redis-2:6379,redis-3:6379,redis-4:6379,redis-5:6379,redis-6:6379}
    - ELASTICSEARCH_URIS=${ELASTICSEARCH_URIS:-http://elasticsearch-1:9200,http://elasticsearch-2:9200,http://elasticsearch-3:9200}
    - XXL_JOB_EXECUTOR_ADDRESS=${XXL_JOB_EXECUTOR_ADDRESS:-http://community-app-1:9999/}
    - XXL_JOB_ACCESS_TOKEN=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
    - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-mailhog}
    - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-1025}
    - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
    - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
    depends_on:
      mailhog:
        condition: service_started
      nacos-db-bootstrap:
        condition: service_completed_successfully
      nacos-config-bootstrap:
        condition: service_completed_successfully
      nacos-1:
        condition: service_healthy
      mock-data-studio-db-bootstrap:
        condition: service_completed_successfully
      mysql-primary:
        condition: service_healthy
      xxl-job-admin-1:
        condition: service_started
      redis-cluster-bootstrap:
        condition: service_completed_successfully
      es-init:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
        - community-app
