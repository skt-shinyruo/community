    - RUNTIME_DIAGNOSTICS_REDIS_MAX_EVENTS_PER_SECOND=${RUNTIME_DIAGNOSTICS_REDIS_MAX_EVENTS_PER_SECOND:-20}
    - RUNTIME_DIAGNOSTICS_KAFKA_MAX_EVENTS_PER_SECOND=${RUNTIME_DIAGNOSTICS_KAFKA_MAX_EVENTS_PER_SECOND:-20}
    - RUNTIME_DIAGNOSTICS_KAFKA_TOPIC_NAMES_ENABLED=${RUNTIME_DIAGNOSTICS_KAFKA_TOPIC_NAMES_ENABLED:-false}
    - RUNTIME_DIAGNOSTICS_SUMMARY_INTERVAL=${RUNTIME_DIAGNOSTICS_SUMMARY_INTERVAL:-60s}
    - RUNTIME_DIAGNOSTICS_THREAD_SNAPSHOT_INTERVAL=${RUNTIME_DIAGNOSTICS_THREAD_SNAPSHOT_INTERVAL:-60s}
