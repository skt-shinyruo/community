    - RUNTIME_DIAGNOSTICS_JDBC_SAMPLE_RATE=${RUNTIME_DIAGNOSTICS_JDBC_SAMPLE_RATE:-1.0}
    - RUNTIME_DIAGNOSTICS_REDIS_SAMPLE_RATE=${RUNTIME_DIAGNOSTICS_REDIS_SAMPLE_RATE:-1.0}
