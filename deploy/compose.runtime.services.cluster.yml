services:
  community-app-1:
    <<: *community-app-base
    environment:
    - SERVER_PORT=8080
    - OTEL_ENABLED=${OTEL_ENABLED:-false}
    - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability-gateway-edot-collector:4318}
    - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
    - OTEL_SERVICE_NAME=community-app
    - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local-compose
    - SERVICE_VERSION=${SERVICE_VERSION:-local-compose}
    - JAVA_OPTS=${COMMUNITY_APP_JAVA_OPTS:--XX:+UseG1GC -XX:+UseStringDeduplication -XX:InitialRAMPercentage=20.0 -XX:MaxRAMPercentage=60.0 -XX:MaxMetaspaceSize=256m -XX:+ExitOnOutOfMemoryError}
    - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev},redis-cluster,volume-log-export
    - COMMUNITY_LOGGING_DIR=/var/log/community
    - COMMUNITY_LOGGING_FILE_NAME=community-app-1.json.log
    - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
    - NACOS_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=${NACOS_SERVER_ADDR:-nacos-1:8848,nacos-2:8848,nacos-3:8848}
    - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
    - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:?METRICS_BASIC_AUTH_PASSWORD is required}
    - DB_PRIMARY_HOST=${DB_PRIMARY_HOST:-mysql-primary}
    - DB_URL=jdbc:mysql://${DB_PRIMARY_HOST:-mysql-primary}:3306/${MYSQL_DATABASE:-community}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    - DB_USERNAME=${MYSQL_USER:-community}
    - DB_PASSWORD=${MYSQL_PASSWORD:-communitypass}
    - SPRING_DATA_REDIS_CLUSTER_NODES=${SPRING_DATA_REDIS_CLUSTER_NODES:-redis-1:6379,redis-2:6379,redis-3:6379,redis-4:6379,redis-5:6379,redis-6:6379}
    - ELASTICSEARCH_URIS=${ELASTICSEARCH_URIS:-http://elasticsearch-1:9200,http://elasticsearch-2:9200,http://elasticsearch-3:9200}
    - OSS_CLIENT_BASE_URL=${OSS_CLIENT_BASE_URL:-http://community-oss:18090}
    - OSS_AVATAR_PUBLIC_BASE_URL=${GATEWAY_PUBLIC_BASE_URL:-http://localhost:12880}
    - AUTH_ORIGIN_GUARD_ALLOWED_ORIGINS=${BROWSER_ALLOWED_ORIGINS:?BROWSER_ALLOWED_ORIGINS is required}
    - AUTH_MAIL_ENABLED=${AUTH_MAIL_ENABLED:-true}
    - AUTH_PASSWORD_RESET_BASE_URL=${FRONTEND_PUBLIC_ORIGIN:?FRONTEND_PUBLIC_ORIGIN is required}
    - AUTH_REGISTRATION_PENDING_USER_TTL_SECONDS=${AUTH_REGISTRATION_PENDING_USER_TTL_SECONDS:-1800}
    - AUTH_REGISTRATION_PENDING_USER_CLEANUP_INTERVAL_MS=${AUTH_REGISTRATION_PENDING_USER_CLEANUP_INTERVAL_MS:-300000}
    - AUTH_REGISTRATION_PENDING_USER_LOCAL_SCHEDULER_ENABLED=false
    - AUTH_REGISTRATION_EXPOSE_CODE=${AUTH_REGISTRATION_EXPOSE_CODE:-false}
    - XXL_JOB_ENABLED=${XXL_JOB_ENABLED:-true}
    - XXL_JOB_ADMIN_INGRESS_URL=${XXL_JOB_ADMIN_INGRESS_URL:-http://nginx:8081/xxl-job-admin}
    - XXL_JOB_ADMIN_ADDRESSES=${XXL_JOB_ADMIN_INGRESS_URL:-http://nginx:8081/xxl-job-admin}
    - XXL_JOB_EXECUTOR_APPNAME=${XXL_JOB_EXECUTOR_APPNAME:-community-app}
    - XXL_JOB_EXECUTOR_ADDRESS=${XXL_JOB_EXECUTOR_ADDRESS:-http://community-app-1:9999/}
    - XXL_JOB_ACCESS_TOKEN=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
    - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-mailhog}
    - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-1025}
    - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
    - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
    - AUTH_REFRESH_COOKIE_SECURE=${AUTH_REFRESH_COOKIE_SECURE:-false}
    - AUTH_REFRESH_COOKIE_SAME_SITE=${AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
    depends_on:
      mailhog:
        condition: service_started
      nacos-db-bootstrap:
        condition: service_completed_successfully
      nacos-1:
        condition: service_healthy
      mock-data-studio-db-bootstrap:
        condition: service_completed_successfully
      mysql-primary:
        condition: service_healthy
      xxl-job-admin-1:
        condition: service_started
      redis-cluster-bootstrap:
        condition: service_completed_successfully
      es-init:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
        - community-app
