services:
  # 对外暴露 gateway（浏览器直连）
  gateway:
    ports:
      - "12882:8080"

  # 前端独立容器：Vite build + preview（无 Nginx）
  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: community-frontend
    ports:
      - "12881:12881"
    depends_on:
      - gateway

  # 直连模式下，激活链接应指向前端端口（如启用“暴露激活链接”功能）
  auth-service:
    environment:
      AUTH_ACTIVATION_BASE_URL: http://localhost:12881
