services:
  # 对外暴露 backend（浏览器直连）
  community-app:
    ports:
      - "12882:8080"
    environment:
      # 直连模式下，激活链接应指向前端端口（如启用“暴露激活链接”功能）
      AUTH_ACTIVATION_BASE_URL: http://localhost:12881

  # 前端独立容器：Vite build + preview（无 Nginx）
  frontend:
    build:
      # frontend 构建需要包含 repo root 的 frontend/ 目录
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: community-frontend
    ports:
      - "12881:12881"
    depends_on:
      - community-app

  # 对外暴露 IM 服务（浏览器直连 WebSocket / HTTP）
  im-core:
    ports:
      - "18082:18082"

  im-realtime:
    ports:
      - "18081:18081"
