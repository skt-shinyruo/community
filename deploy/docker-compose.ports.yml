name: community

# 端口暴露覆盖（可选）：
# - 默认 docker-compose.yml 不暴露业务服务端口（fail-closed），避免“旁路直连服务”绕过网关的安全策略；
# - 需要本地联调时，可额外叠加本文件，仅暴露 gateway 作为统一入口。
#
# 使用方式：
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.ports.yml up -d
#
# 约束：
# - 不要在此文件中暴露 auth-service/user-service 等下游服务端口；
# - 若必须临时暴露（排障），建议只绑定到 127.0.0.1 并在结束后立即回滚。

services:
  gateway:
    ports:
      - "0.0.0.0:${GATEWAY_PORT:-12881}:8080"

