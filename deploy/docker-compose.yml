      - USER_AVATAR_STORAGE=${USER_AVATAR_STORAGE:-local}
      - USER_FILES_BASE_DIR=${USER_FILES_BASE_DIR:-/data/files}
      - USER_PUBLIC_BASE_URL=${USER_PUBLIC_BASE_URL:-http://localhost:12881}
      - AUTH_MAIL_ENABLED=${AUTH_MAIL_ENABLED:-true}
      - AUTH_REGISTRATION_PENDING_USER_TTL_SECONDS=${AUTH_REGISTRATION_PENDING_USER_TTL_SECONDS:-1800}
      - AUTH_REGISTRATION_PENDING_USER_CLEANUP_INTERVAL_MS=${AUTH_REGISTRATION_PENDING_USER_CLEANUP_INTERVAL_MS:-300000}
      - AUTH_REGISTRATION_PENDING_USER_LOCAL_SCHEDULER_ENABLED=false
      - AUTH_REGISTRATION_EXPOSE_CODE=${AUTH_REGISTRATION_EXPOSE_CODE:-false}
      - AUTH_EXPOSE_RESET_LINK=${AUTH_EXPOSE_RESET_LINK:-false}
      - XXL_JOB_ENABLED=${XXL_JOB_ENABLED:-true}
      - XXL_JOB_ADMIN_ADDRESSES=${XXL_JOB_ADMIN_ADDRESSES:-http://xxl-job-admin:8080/xxl-job-admin}
      - XXL_JOB_EXECUTOR_APPNAME=${XXL_JOB_EXECUTOR_APPNAME:-community-app}
      - XXL_JOB_EXECUTOR_ADDRESS=${XXL_JOB_EXECUTOR_ADDRESS:-http://community-app-2:9999/}
      - XXL_JOB_ACCESS_TOKEN=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-mailhog}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-1025}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
      - AUTH_REFRESH_COOKIE_SECURE=${AUTH_REFRESH_COOKIE_SECURE:-false}
      - AUTH_REFRESH_COOKIE_SAME_SITE=${AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY:-}
      - R2_SECRET_KEY=${R2_SECRET_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_REGION=${R2_REGION:-auto}
      - R2_PATH_STYLE=${R2_PATH_STYLE:-true}
    volumes:
      - user_files:/data/files
      - observability_logs:/var/log/community
    depends_on:
      mailhog:
        condition: service_started
      mysql:
        condition: service_healthy
      xxl-job-admin-1:
        condition: service_started
      redis:
        condition: service_healthy
      es-init:
        condition: service_completed_successfully

