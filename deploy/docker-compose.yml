name: community

services:
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: community-nacos
    ports:
      - "127.0.0.1:${NACOS_UI_PORT:-8848}:8848"
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: community-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      # P0: per-service schemas/users (same instance, different schema)
      - CONTENT_DB_NAME=${CONTENT_DB_NAME:-community_content}
      - CONTENT_DB_USER=${CONTENT_DB_USER:-community_content}
      - CONTENT_DB_PASSWORD=${CONTENT_DB_PASSWORD:-community_contentpass}
      - MESSAGE_DB_NAME=${MESSAGE_DB_NAME:-community_message}
      - MESSAGE_DB_USER=${MESSAGE_DB_USER:-community_message}
      - MESSAGE_DB_PASSWORD=${MESSAGE_DB_PASSWORD:-community_messagepass}
      - SEARCH_DB_NAME=${SEARCH_DB_NAME:-community_search}
      - SEARCH_DB_USER=${SEARCH_DB_USER:-community_search}
      - SEARCH_DB_PASSWORD=${SEARCH_DB_PASSWORD:-community_searchpass}
      - SOCIAL_DB_NAME=${SOCIAL_DB_NAME:-community_social}
      - SOCIAL_DB_USER=${SOCIAL_DB_USER:-community_social}
      - SOCIAL_DB_PASSWORD=${SOCIAL_DB_PASSWORD:-community_socialpass}
      # user-service（identity DB）专用账号：用于 init 脚本创建最小权限用户（避免依赖 MYSQL_USER 语义）。
      - USER_DB_USERNAME=${USER_DB_USERNAME:-community}
      - USER_DB_PASSWORD=${USER_DB_PASSWORD:-communitypass}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: community-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: community-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      # 持久化 ZK 状态，避免 kafka_data 保留但 ZK 重建导致 clusterId 不一致
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: community-kafka
    restart: on-failure
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: community-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    # NOTE: 必须确保整个脚本作为“单一参数”传给 bash -lc；
    # 否则会退化为只执行 `set`，导致 topic 未创建。
    command:
      - |
        set -euo pipefail
        echo "[kafka-init] waiting for broker..."
        for i in {1..60}; do
          kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break || true
          sleep 2
        done
        echo "[kafka-init] creating topics (if not exists)..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.post.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.comment.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.social.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.moderation.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.post.v1.dlq --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.comment.v1.dlq --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.social.v1.dlq --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.moderation.v1.dlq --replication-factor 1 --partitions 1
        echo "[kafka-init] done."
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: community-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data

  es-init:
    image: curlimages/curl:8.6.0
    container_name: community-es-init
    depends_on:
      elasticsearch:
        condition: service_started
    command: >
      sh -c '
      set -e;
      echo "[es-init] waiting for elasticsearch...";
      until curl -fsS http://elasticsearch:9200 >/dev/null 2>&1; do sleep 2; done;
      code=$$(curl -s -o /dev/null -w "%{http_code}" http://elasticsearch:9200/community_posts);
      if [ "$$code" = "404" ]; then
        echo "[es-init] creating index community_posts...";
        curl -fsS -X PUT http://elasticsearch:9200/community_posts -H "Content-Type: application/json" -d "{\"settings\":{\"number_of_shards\":1,\"number_of_replicas\":0}}";
      else
        echo "[es-init] index community_posts already exists (code=$$code)";
      fi;
      echo "[es-init] done."
      '
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: community-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - gateway
      - auth-service
      - search-service
      - message-service
      - analytics-service
      - social-service
      - user-service
      - content-service

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: community-alertmanager
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  loki:
    image: grafana/loki:2.9.4
    container_name: community-loki
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/config.yml"]

  promtail:
    image: grafana/promtail:2.9.4
    container_name: community-promtail
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.5
    container_name: community-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: gateway
    container_name: community-gateway
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - ANALYTICS_INTERNAL_TOKEN=${ANALYTICS_INTERNAL_TOKEN}
      - SEARCH_INTERNAL_TOKEN=${SEARCH_INTERNAL_TOKEN}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  auth-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: auth-service
    container_name: community-auth-service
    environment:
      - SERVER_PORT=8082
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - USER_INTERNAL_TOKEN=${USER_INTERNAL_TOKEN:-}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - AUTH_REFRESH_COOKIE_SECURE=${AUTH_REFRESH_COOKIE_SECURE:-false}
      - AUTH_REFRESH_COOKIE_SAME_SITE=${AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      - AUTH_REDIS_HOST=redis
      - AUTH_REDIS_PORT=6379
      - AUTH_ACTIVATION_BASE_URL=${AUTH_ACTIVATION_BASE_URL:-http://localhost:12881}
      - AUTH_MAIL_ENABLED=${AUTH_MAIL_ENABLED:-false}
      - AUTH_EXPOSE_ACTIVATION_LINK=${AUTH_EXPOSE_ACTIVATION_LINK:-false}
      - AUTH_EXPOSE_RESET_LINK=${AUTH_EXPOSE_RESET_LINK:-false}
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

  user-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: user-service
    container_name: community-user-service
    environment:
      - SERVER_PORT=8087
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - USER_INTERNAL_TOKEN=${USER_INTERNAL_TOKEN:-}
      - SOCIAL_INTERNAL_TOKEN=${SOCIAL_INTERNAL_TOKEN:-}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - USER_DB_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - USER_DB_USERNAME=${USER_DB_USERNAME:-community}
      - USER_DB_PASSWORD=${USER_DB_PASSWORD:-communitypass}
      - QINIU_ACCESS_KEY=${QINIU_ACCESS_KEY:-}
      - QINIU_SECRET_KEY=${QINIU_SECRET_KEY:-}
      - QINIU_BUCKET_HEADER_NAME=${QINIU_BUCKET_HEADER_NAME:-}
      - QINIU_BUCKET_HEADER_URL=${QINIU_BUCKET_HEADER_URL:-}
      - USER_AVATAR_STORAGE=${USER_AVATAR_STORAGE:-local}
      - USER_FILES_BASE_DIR=${USER_FILES_BASE_DIR:-/data/files}
      - USER_PUBLIC_BASE_URL=${USER_PUBLIC_BASE_URL:-http://localhost:12881}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - user_files:/data/files
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy

  social-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: social-service
    container_name: community-social-service
    environment:
      - SERVER_PORT=8086
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - SOCIAL_INTERNAL_TOKEN=${SOCIAL_INTERNAL_TOKEN:-}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - SOCIAL_REDIS_HOST=redis
      - SOCIAL_REDIS_PORT=6379
      - SOCIAL_DB_URL=jdbc:mysql://mysql:3306/${SOCIAL_DB_NAME:-community_social}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - SOCIAL_DB_USERNAME=${SOCIAL_DB_USER:-community_social}
      - SOCIAL_DB_PASSWORD=${SOCIAL_DB_PASSWORD:-community_socialpass}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy

  content-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: content-service
    container_name: community-content-service
    environment:
      - SERVER_PORT=8088
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - CONTENT_INTERNAL_TOKEN=${CONTENT_INTERNAL_TOKEN:-}
      - USER_INTERNAL_TOKEN=${USER_INTERNAL_TOKEN:-}
      - SOCIAL_INTERNAL_TOKEN=${SOCIAL_INTERNAL_TOKEN:-}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - CONTENT_DB_URL=jdbc:mysql://mysql:3306/${CONTENT_DB_NAME:-community_content}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - CONTENT_DB_USERNAME=${CONTENT_DB_USER:-community_content}
      - CONTENT_DB_PASSWORD=${CONTENT_DB_PASSWORD:-community_contentpass}
      - CONTENT_REDIS_HOST=redis
      - CONTENT_REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy

  search-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: search-service
    container_name: community-search-service
    environment:
      - SERVER_PORT=8083
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - CONTENT_INTERNAL_TOKEN=${CONTENT_INTERNAL_TOKEN:-}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - SEARCH_DB_URL=jdbc:mysql://mysql:3306/${SEARCH_DB_NAME:-community_search}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - SEARCH_DB_USERNAME=${SEARCH_DB_USER:-community_search}
      - SEARCH_DB_PASSWORD=${SEARCH_DB_PASSWORD:-community_searchpass}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SEARCH_INTERNAL_TOKEN=${SEARCH_INTERNAL_TOKEN}
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  message-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: message-service
    container_name: community-message-service
    environment:
      - SERVER_PORT=8084
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - USER_INTERNAL_TOKEN=${USER_INTERNAL_TOKEN:-}
      - SOCIAL_INTERNAL_TOKEN=${SOCIAL_INTERNAL_TOKEN:-}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - MESSAGE_DB_URL=jdbc:mysql://mysql:3306/${MESSAGE_DB_NAME:-community_message}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - MESSAGE_DB_USERNAME=${MESSAGE_DB_USER:-community_message}
      - MESSAGE_DB_PASSWORD=${MESSAGE_DB_PASSWORD:-community_messagepass}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy

  analytics-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.spring-service
      args:
        MODULE: analytics-service
    container_name: community-analytics-service
    environment:
      - SERVER_PORT=8085
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:?Missing SPRING_PROFILES_ACTIVE}
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-}
      - ANALYTICS_REDIS_HOST=redis
      - ANALYTICS_REDIS_PORT=6379
      - ANALYTICS_INTERNAL_TOKEN=${ANALYTICS_INTERNAL_TOKEN}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy

volumes:
  mysql_data: {}
  redis_data: {}
  user_files: {}
  zookeeper_data: {}
  zookeeper_log: {}
  kafka_data: {}
  es_data: {}
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}
