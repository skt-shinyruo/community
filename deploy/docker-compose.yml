  # compose network so the default stack stays closed while debug mode keeps familiar ports.
  community-app-debug-port:
    profiles: ["debug"]
    image: caddy:2.8-alpine
    container_name: community-app-debug-port
    command: ["caddy", "reverse-proxy", "--from", ":8080", "--to", "community-app-1:8080"]
    depends_on:
      community-app-1:
        condition: service_started
    ports:
      - "127.0.0.1:12882:8080"

  im-core-debug-port:
