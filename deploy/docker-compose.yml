  mock-data-studio:
    build:
      context: ..
      dockerfile: tools/mock-data-studio/Dockerfile
    container_name: community-mock-data-studio
    ports:
      - "127.0.0.1:${MOCK_DATA_STUDIO_HOST_PORT:-12888}:${MOCK_DATA_STUDIO_PORT:-12888}"
    environment:
      - MOCK_DATA_STUDIO_ENABLED=${MOCK_DATA_STUDIO_ENABLED:-true}
      - MOCK_DATA_STUDIO_PORT=${MOCK_DATA_STUDIO_PORT:-12888}
      - MOCK_DATA_STUDIO_BIND_HOST=0.0.0.0
      - MOCK_DATA_STUDIO_DB_URL=mysql://${DB_PRIMARY_HOST:-mysql-primary}:3306/${MYSQL_DATABASE:-community}
      - MOCK_DATA_STUDIO_DB_USER=${MOCK_DATA_STUDIO_DB_USER:-mock_data_studio}
      - MOCK_DATA_STUDIO_DB_PASSWORD=${MOCK_DATA_STUDIO_DB_PASSWORD:-mockdatastudiopass}
      - MOCK_DATA_STUDIO_COMMUNITY_APP_BASE_URL=http://community-app:8080
      - MOCK_DATA_STUDIO_IM_CORE_BASE_URL=http://im-core:18082
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - MOCK_DATA_AUTO_FILL_ENABLED=${MOCK_DATA_AUTO_FILL_ENABLED:-false}
      - MOCK_DATA_AUTO_FILL_SCENE=${MOCK_DATA_AUTO_FILL_SCENE:-tech-community-hot-start}
      - MOCK_DATA_DEFAULT_USERS=${MOCK_DATA_DEFAULT_USERS:-100}
      - MOCK_DATA_DEFAULT_POSTS=${MOCK_DATA_DEFAULT_POSTS:-800}
      - MOCK_DATA_DEFAULT_COMMENTS=${MOCK_DATA_DEFAULT_COMMENTS:-2500}
    depends_on:
      mysql-primary:
        condition: service_healthy
      mock-data-studio-db-bootstrap:
        condition: service_completed_successfully
      community-app-1:
        condition: service_started
      im-core-1:
        condition: service_started

  mock-data-studio-db-bootstrap:
    image: mysql:8.0
    container_name: community-mock-data-studio-db-bootstrap
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        sql_escape() {
          local value="$${1//\\/\\\\}"
          value="$${value//\'/\'\'}"
          printf "%s" "$${value}"
        }
        MYSQL_DATABASE_ESCAPED="$$(sql_escape "$${MYSQL_DATABASE:-community}")"
        IM_MYSQL_DATABASE_ESCAPED="$$(sql_escape "$${IM_MYSQL_DATABASE:-im_core}")"
        STUDIO_USER_ESCAPED="$$(sql_escape "$${MOCK_DATA_STUDIO_DB_USER:-mock_data_studio}")"
        STUDIO_PASSWORD_ESCAPED="$$(sql_escape "$${MOCK_DATA_STUDIO_DB_PASSWORD:-mockdatastudiopass}")"
        mysql --default-character-set=utf8mb4 -h"$${DB_PRIMARY_HOST:-mysql-primary}" -uroot -p"$${MYSQL_ROOT_PASSWORD}" < /bootstrap/010_schema.sql
        mysql --default-character-set=utf8mb4 -h"$${DB_PRIMARY_HOST:-mysql-primary}" -uroot -p"$${MYSQL_ROOT_PASSWORD}" <<SQL
        create user if not exists '$${STUDIO_USER_ESCAPED}'@'%' identified by '$${STUDIO_PASSWORD_ESCAPED}';
        grant select, insert, update, delete, create, alter on \`$${MYSQL_DATABASE_ESCAPED}\`.* to '$${STUDIO_USER_ESCAPED}'@'%';
        grant select, insert, update, delete on \`$${IM_MYSQL_DATABASE_ESCAPED}\`.* to '$${STUDIO_USER_ESCAPED}'@'%';
        flush privileges;
        SQL
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_PRIMARY_HOST=${DB_PRIMARY_HOST:-mysql-primary}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-community}
      - IM_MYSQL_DATABASE=${IM_MYSQL_DATABASE:-im_core}
      - MOCK_DATA_STUDIO_DB_USER=${MOCK_DATA_STUDIO_DB_USER:-mock_data_studio}
      - MOCK_DATA_STUDIO_DB_PASSWORD=${MOCK_DATA_STUDIO_DB_PASSWORD:-mockdatastudiopass}
    volumes:
      - ./mysql-init:/bootstrap:ro
    depends_on:
      mysql-primary:
        condition: service_healthy

