name: community

services:
  mysql:
    image: mysql:8.0
    container_name: community-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-community}
      - MYSQL_USER=${MYSQL_USER:-community}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-communitypass}
      - MOCK_DATA_STUDIO_DB_USER=${MOCK_DATA_STUDIO_DB_USER:-mock_data_studio}
      - MOCK_DATA_STUDIO_DB_PASSWORD=${MOCK_DATA_STUDIO_DB_PASSWORD:-mockdatastudiopass}
      - XXL_JOB_MYSQL_USER=${XXL_JOB_MYSQL_USER:-xxl_job}
      - XXL_JOB_MYSQL_PASSWORD=${XXL_JOB_MYSQL_PASSWORD:-xxljobpass}
      - XXL_JOB_ADMIN_USERNAME=${XXL_JOB_ADMIN_USERNAME:-admin}
      - XXL_JOB_ADMIN_PASSWORD=${XXL_JOB_ADMIN_PASSWORD:-dev-local-xxl-admin}
      - XXL_JOB_EXECUTOR_APPNAME=${XXL_JOB_EXECUTOR_APPNAME:-community-app}
      - XXL_JOB_EXECUTOR_TITLE=${XXL_JOB_EXECUTOR_TITLE:-CommunityApp}
      - XXL_JOB_AUTHOR=${XXL_JOB_AUTHOR:-community}
      - XXL_JOB_ALARM_EMAIL=${XXL_JOB_ALARM_EMAIL:-}
      - XXL_JOB_PENDING_REGISTRATION_CLEANUP_CRON=${XXL_JOB_PENDING_REGISTRATION_CLEANUP_CRON:-0 0/5 * * * ?}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: community-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  xxl-job-admin-1:
    image: xuxueli/xxl-job-admin:3.3.2
    environment:
      - PARAMS=--spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true --spring.datasource.username=${XXL_JOB_MYSQL_USER:-xxl_job} --spring.datasource.password=${XXL_JOB_MYSQL_PASSWORD:-xxljobpass} --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      default:
        aliases:
          - xxl-job-admin

  xxl-job-admin-2:
    image: xuxueli/xxl-job-admin:3.3.2
    environment:
      - PARAMS=--spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true --spring.datasource.username=${XXL_JOB_MYSQL_USER:-xxl_job} --spring.datasource.password=${XXL_JOB_MYSQL_PASSWORD:-xxljobpass} --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
    depends_on:
      mysql:
        condition: service_healthy

  # Dev mailbox：用于本地接收 SMTP 邮件（注册验证码/找回密码），UI 仅绑定到宿主机 127.0.0.1
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: community-mailhog
    ports:
      - "127.0.0.1:8025:8025"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: community-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      # 持久化 ZK 状态，避免 kafka_data 保留但 ZK 重建导致 clusterId 不一致
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: community-kafka
    restart: on-failure
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: community-kafka-init
    depends_on:
      kafka:
        condition: service_started
    entrypoint: ["/bin/bash", "-lc"]
    # NOTE: 必须确保整个脚本作为“单一参数”传给 bash -lc；
    # 否则会退化为只执行 `set`，导致 topic 未创建。
    command:
      - |
        set -euo pipefail
        echo "[kafka-init] waiting for broker..."
        for i in {1..60}; do
          kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break || true
          sleep 2
        done
        echo "[kafka-init] creating topics (if not exists)..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.private_text.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.room_text.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.event.private_persisted.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.event.room_persisted.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.event.room_member_changed.v1 --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.private_text.v1.dlq --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.room_text.v1.dlq --replication-factor 1 --partitions 12
        echo "[kafka-init] done."
    restart: "no"

  # Shared base Elasticsearch node for app search and the optional Elastic observability profile.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: community-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data

  es-init:
    image: curlimages/curl:8.6.0
    container_name: community-es-init
    depends_on:
      elasticsearch:
        condition: service_started
    command: >
      sh -c '
      set -e;
      echo "[es-init] waiting for elasticsearch...";
      until curl -fsS http://elasticsearch:9200 >/dev/null 2>&1; do sleep 2; done;
      code=$$(curl -s -o /dev/null -w "%{http_code}" http://elasticsearch:9200/community_posts);
      if [ "$$code" = "404" ]; then
        echo "[es-init] creating index community_posts...";
        curl -fsS -X PUT http://elasticsearch:9200/community_posts -H "Content-Type: application/json" -d "{\"settings\":{\"number_of_shards\":1,\"number_of_replicas\":0}}";
      else
        echo "[es-init] index community_posts already exists (code=$$code)";
      fi;
      echo "[es-init] done."
      '
    restart: "no"

  community-app-1:
    build:
      # 后端工程在 backend/ 下；镜像构建以 backend 作为 build context
      context: ../backend
      # dockerfile 路径相对 build context（backend/）
      dockerfile: ../deploy/Dockerfile.backend-service
      args:
        MODULE: community-app
        OTEL_JAVA_AGENT_VERSION: ${OTEL_JAVA_AGENT_VERSION:-2.23.0}
    environment:
      - SERVER_PORT=8080
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability-gateway-edot-collector:4318}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      - OTEL_SERVICE_NAME=community-app
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=local-compose
      - SERVICE_VERSION=${SERVICE_VERSION:-local-compose}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev},volume-log-export
      - COMMUNITY_LOGGING_DIR=/var/log/community
      - COMMUNITY_LOGGING_FILE_NAME=community-app-1.json.log
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:?METRICS_BASIC_AUTH_PASSWORD is required}
      - DB_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-community}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - DB_USERNAME=${MYSQL_USER:-community}
      - DB_PASSWORD=${MYSQL_PASSWORD:-communitypass}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - USER_AVATAR_STORAGE=${USER_AVATAR_STORAGE:-local}
      - USER_FILES_BASE_DIR=${USER_FILES_BASE_DIR:-/data/files}
      - USER_PUBLIC_BASE_URL=${USER_PUBLIC_BASE_URL:-http://localhost:12881}
      - AUTH_MAIL_ENABLED=${AUTH_MAIL_ENABLED:-true}
      - AUTH_REGISTRATION_PENDING_USER_TTL_SECONDS=${AUTH_REGISTRATION_PENDING_USER_TTL_SECONDS:-1800}
      - AUTH_REGISTRATION_PENDING_USER_CLEANUP_INTERVAL_MS=${AUTH_REGISTRATION_PENDING_USER_CLEANUP_INTERVAL_MS:-300000}
      - AUTH_REGISTRATION_PENDING_USER_LOCAL_SCHEDULER_ENABLED=false
      - AUTH_REGISTRATION_EXPOSE_CODE=${AUTH_REGISTRATION_EXPOSE_CODE:-false}
      - AUTH_EXPOSE_RESET_LINK=${AUTH_EXPOSE_RESET_LINK:-false}
      - XXL_JOB_ENABLED=${XXL_JOB_ENABLED:-true}
      - XXL_JOB_ADMIN_ADDRESSES=${XXL_JOB_ADMIN_ADDRESSES:-http://xxl-job-admin:8080/xxl-job-admin}
      - XXL_JOB_EXECUTOR_APPNAME=${XXL_JOB_EXECUTOR_APPNAME:-community-app}
      - XXL_JOB_EXECUTOR_ADDRESS=${XXL_JOB_EXECUTOR_ADDRESS:-http://community-app-1:9999/}
      - XXL_JOB_ACCESS_TOKEN=${XXL_JOB_ACCESS_TOKEN:?XXL_JOB_ACCESS_TOKEN is required}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-mailhog}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-1025}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
      - SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
      - AUTH_REFRESH_COOKIE_SECURE=${AUTH_REFRESH_COOKIE_SECURE:-false}
      - AUTH_REFRESH_COOKIE_SAME_SITE=${AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY:-}
      - R2_SECRET_KEY=${R2_SECRET_KEY:-}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME:-}
      - R2_REGION=${R2_REGION:-auto}
      - R2_PATH_STYLE=${R2_PATH_STYLE:-true}
    volumes:
      - user_files:/data/files
      - observability_logs:/var/log/community
    depends_on:
      mailhog:
        condition: service_started
      mysql:
        condition: service_healthy
      xxl-job-admin-1:
        condition: service_started
      redis:
        condition: service_healthy
      es-init:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
          - community-app

