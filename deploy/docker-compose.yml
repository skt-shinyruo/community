name: community

services:
  mysql:
    image: mysql:8.0
    container_name: community-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-community}
      - MYSQL_USER=${MYSQL_USER:-community}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-communitypass}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: community-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: community-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      # 持久化 ZK 状态，避免 kafka_data 保留但 ZK 重建导致 clusterId 不一致
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: community-kafka
    restart: on-failure
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: community-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    # NOTE: 必须确保整个脚本作为“单一参数”传给 bash -lc；
    # 否则会退化为只执行 `set`，导致 topic 未创建。
    command:
      - |
        set -euo pipefail
        echo "[kafka-init] waiting for broker..."
        for i in {1..60}; do
          kafka-topics --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break || true
          sleep 2
        done
        echo "[kafka-init] creating topics (if not exists)..."
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.post.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.comment.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.social.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.moderation.v1 --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.post.v1.dlq --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.comment.v1.dlq --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.social.v1.dlq --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic community.event.moderation.v1.dlq --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.private_text.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.room_text.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.event.private_persisted.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.event.room_persisted.v1 --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.event.room_member_changed.v1 --replication-factor 1 --partitions 3
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.private_text.v1.dlq --replication-factor 1 --partitions 12
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic im.command.room_text.v1.dlq --replication-factor 1 --partitions 12
        echo "[kafka-init] done."
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: community-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data

  es-init:
    image: curlimages/curl:8.6.0
    container_name: community-es-init
    depends_on:
      elasticsearch:
        condition: service_started
    command: >
      sh -c '
      set -e;
      echo "[es-init] waiting for elasticsearch...";
      until curl -fsS http://elasticsearch:9200 >/dev/null 2>&1; do sleep 2; done;
      code=$$(curl -s -o /dev/null -w "%{http_code}" http://elasticsearch:9200/community_posts);
      if [ "$$code" = "404" ]; then
        echo "[es-init] creating index community_posts...";
        curl -fsS -X PUT http://elasticsearch:9200/community_posts -H "Content-Type: application/json" -d "{\"settings\":{\"number_of_shards\":1,\"number_of_replicas\":0}}";
      else
        echo "[es-init] index community_posts already exists (code=$$code)";
      fi;
      echo "[es-init] done."
      '
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: community-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - community-app

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: community-alertmanager
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  loki:
    image: grafana/loki:2.9.4
    container_name: community-loki
    volumes:
      - ./observability/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/config.yml"]

  promtail:
    image: grafana/promtail:2.9.4
    container_name: community-promtail
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.5
    container_name: community-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

  community-app:
    build:
      # 后端工程在 backend/ 下；镜像构建以 backend 作为 build context
      context: ../backend
      # dockerfile 路径相对 build context（backend/）
      dockerfile: ../deploy/Dockerfile.spring-service
      args:
        MODULE: community-bootstrap
    container_name: community-app
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - METRICS_BASIC_AUTH_USERNAME=${METRICS_BASIC_AUTH_USERNAME:-prometheus}
      - METRICS_BASIC_AUTH_PASSWORD=${METRICS_BASIC_AUTH_PASSWORD:-dev-prometheus-pass}
      - DB_URL=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-community}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - DB_USERNAME=${MYSQL_USER:-community}
      - DB_PASSWORD=${MYSQL_PASSWORD:-communitypass}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_URIS=http://elasticsearch:9200
      - USER_AVATAR_STORAGE=${USER_AVATAR_STORAGE:-local}
      - USER_FILES_BASE_DIR=${USER_FILES_BASE_DIR:-/data/files}
      - USER_PUBLIC_BASE_URL=${USER_PUBLIC_BASE_URL:-http://localhost:12881}
      - AUTH_ACTIVATION_BASE_URL=${AUTH_ACTIVATION_BASE_URL:-http://localhost:12881}
      - AUTH_MAIL_ENABLED=${AUTH_MAIL_ENABLED:-false}
      - AUTH_EXPOSE_ACTIVATION_LINK=${AUTH_EXPOSE_ACTIVATION_LINK:-true}
      - AUTH_EXPOSE_RESET_LINK=${AUTH_EXPOSE_RESET_LINK:-true}
      - AUTH_REFRESH_COOKIE_SECURE=${AUTH_REFRESH_COOKIE_SECURE:-false}
      - AUTH_REFRESH_COOKIE_SAME_SITE=${AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      - QINIU_ACCESS_KEY=${QINIU_ACCESS_KEY:-}
      - QINIU_SECRET_KEY=${QINIU_SECRET_KEY:-}
      - QINIU_BUCKET_HEADER_NAME=${QINIU_BUCKET_HEADER_NAME:-}
      - QINIU_BUCKET_HEADER_URL=${QINIU_BUCKET_HEADER_URL:-}
    volumes:
      - user_files:/data/files
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_started

  im-core:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.spring-service
      args:
        MODULE: im-core
    container_name: im-core
    environment:
      - SERVER_PORT=18082
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - IM_CORE_DB_URL=jdbc:mysql://mysql:3306/${IM_MYSQL_DATABASE:-im_core}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - IM_CORE_DB_USER=${IM_MYSQL_USER:-im_core}
      - IM_CORE_DB_PASSWORD=${IM_MYSQL_PASSWORD:-imcorepass}
      - IM_CORS_ALLOWED_ORIGINS=${IM_CORS_ALLOWED_ORIGINS:-http://localhost:12881,http://127.0.0.1:12881,http://localhost:5173}
    depends_on:
      mysql:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  im-realtime:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.spring-service
      args:
        MODULE: im-realtime
    container_name: im-realtime
    environment:
      - SERVER_PORT=18081
      - JWT_HMAC_SECRET=${JWT_HMAC_SECRET}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - IM_CORE_BASE_URL=http://im-core:18082
      - IM_ROOM_FLUSH_INTERVAL_MS=${IM_ROOM_FLUSH_INTERVAL_MS:-50}
      - IM_WS_OUTBOUND_BUFFER_SIZE=${IM_WS_OUTBOUND_BUFFER_SIZE:-256}
      - IM_CORS_ALLOWED_ORIGINS=${IM_CORS_ALLOWED_ORIGINS:-http://localhost:12881,http://127.0.0.1:12881,http://localhost:5173}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      im-core:
        condition: service_started

volumes:
  mysql_data: {}
  redis_data: {}
  user_files: {}
  zookeeper_data: {}
  zookeeper_log: {}
  kafka_data: {}
  es_data: {}
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}
