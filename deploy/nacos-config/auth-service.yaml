spring:
  data:
    redis:
      host: ${AUTH_REDIS_HOST:redis}
      port: ${AUTH_REDIS_PORT:6379}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:dev-secret-please-change-at-least-32bytes}

auth:
  user-client:
    base-url: ${USER_SERVICE_BASE_URL:http://user-service}
    internal-token: ${USER_INTERNAL_TOKEN:${INTERNAL_TOKEN:}}
    connect-timeout: 200ms
    read-timeout: 800ms
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  password-reset:
    store: redis
    ttl-seconds: 600
  registration:
    activation-base-url: ${AUTH_ACTIVATION_BASE_URL:http://localhost:12881}
    mail:
      enabled: ${AUTH_MAIL_ENABLED:false}
  login-rate-limit:
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2
