spring:
  datasource:
    url: ${CONTENT_DB_URL:jdbc:mysql://mysql:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:community}
    password: ${MYSQL_PASSWORD:communitypass}
  data:
    redis:
      host: ${CONTENT_REDIS_HOST:redis}
      port: ${CONTENT_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET}

content:
  events:
    publisher: kafka
    outbox:
      # 默认开启：可靠投递作为默认安全态（可通过开关回滚到 after-commit 直发）。
      enabled: true
      relay-enabled: true
      batch-size: 200
      max-retries: 10
      base-delay-ms: 1000
      max-delay-ms: 60000
      relay-interval-ms: 5000
      send-timeout-ms: 3000
  # internal 接口令牌：建议按服务隔离，避免全局 token 泄露扩大爆炸半径。
  internal-token: ${CONTENT_INTERNAL_TOKEN:}
  # 轮转窗口：灰度期间允许 previous 继续访问（配合 common/InternalTokenFilter）。
  internal-token-previous: ${CONTENT_INTERNAL_TOKEN_PREVIOUS:}
  score:
    refresh:
      enabled: true

clients:
  user:
    base-url: ${USER_SERVICE_BASE_URL:http://user-service}
    internal-token: ${USER_INTERNAL_TOKEN:}
    # user-service 高权限 internal 写接口分域 token（例如 /internal/users/{id}/moderation）。
    ops-internal-token: ${USER_OPS_INTERNAL_TOKEN:}
    fail-open: false
  social:
    base-url: ${SOCIAL_SERVICE_BASE_URL:http://social-service}
    internal-token: ${SOCIAL_INTERNAL_TOKEN:}
    fail-open: false

# internal 运维入口强保护（default deny + break-glass）。
ops:
  content:
    token: ${OPS_CONTENT_TOKEN:}
    token-previous: ${OPS_CONTENT_TOKEN_PREVIOUS:}
  guard:
    outbox-replay:
      enabled: ${OPS_OUTBOX_REPLAY_ENABLED:false}
      # 默认仅允许本机/回环（生产请改为堡垒机/内网管理网段）。
      allowlist: ${OPS_OUTBOX_REPLAY_ALLOWLIST:127.0.0.1,::1}
    rate:
      window-seconds: ${OPS_RATE_WINDOW_SECONDS:60}
      max: ${OPS_RATE_MAX:3}
    lock:
      ttl-seconds: ${OPS_LOCK_TTL_SECONDS:600}
