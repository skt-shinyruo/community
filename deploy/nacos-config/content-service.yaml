spring:
  datasource:
    url: ${CONTENT_DB_URL:jdbc:mysql://mysql:3306/community_content?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${CONTENT_DB_USERNAME:community_content}
    password: ${CONTENT_DB_PASSWORD:community_contentpass}
  data:
    redis:
      host: ${CONTENT_REDIS_HOST:redis}
      port: ${CONTENT_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET}

content:
  events:
    publisher: kafka
    outbox:
      # 默认开启：可靠投递作为默认安全态（可通过开关回滚到 after-commit 直发）。
      enabled: true
      relay-enabled: true
      # MySQL 8+ 推荐开启：多实例 relay 并发认领时避免头阻塞（不支持可关闭回退）。
      claim-skip-locked-enabled: true
      batch-size: 200
      max-retries: 10
      base-delay-ms: 1000
      max-delay-ms: 60000
      relay-interval-ms: 5000
      send-timeout-ms: 3000
  score:
    refresh:
      enabled: true

clients:
  user:
    base-url: ${USER_SERVICE_BASE_URL:http://user-service}
    fail-open: false
  social:
    base-url: ${SOCIAL_SERVICE_BASE_URL:http://social-service}
    fail-open: false

http:
  idempotency:
    enabled: true
    store: DB
