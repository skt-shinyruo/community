spring:
  datasource:
    url: ${MESSAGE_DB_URL:jdbc:mysql://mysql:3306/community_message?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MESSAGE_DB_USERNAME:community_message}
    password: ${MESSAGE_DB_PASSWORD:community_messagepass}
  data:
    redis:
      host: ${MESSAGE_REDIS_HOST:redis}
      port: ${MESSAGE_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET}

message:
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000

clients:
  user:
    base-url: ${USER_SERVICE_BASE_URL:http://user-service}
    # 聚合读接口允许降级：避免 user-service 抖动影响会话/通知列表等展示。
    fail-open: true
  social:
    base-url: ${SOCIAL_SERVICE_BASE_URL:http://social-service}
    fail-open: false
