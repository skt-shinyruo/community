spring:
  datasource:
    url: ${MESSAGE_DB_URL:jdbc:mysql://mysql:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:community}
    password: ${MYSQL_PASSWORD:communitypass}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:dev-secret-please-change-at-least-32bytes}

message:
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000

clients:
  social:
    base-url: ${SOCIAL_SERVICE_BASE_URL:http://social-service}
    internal-token: ${SOCIAL_INTERNAL_TOKEN:${INTERNAL_TOKEN:}}
    fail-open: false
