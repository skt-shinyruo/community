spring:
  datasource:
    url: ${SEARCH_DB_URL:jdbc:mysql://mysql:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:community}
    password: ${MYSQL_PASSWORD:communitypass}
  data:
    redis:
      host: ${SEARCH_REDIS_HOST:redis}
      port: ${SEARCH_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://elasticsearch:9200}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET}

search:
  # SSOT：生产/默认使用 Elasticsearch；仅测试/演示可显式覆盖为 memory（并关闭 ES 依赖）。
  storage: es
  internal-token: ${SEARCH_INTERNAL_TOKEN}
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000
  index:
    prefix: community_posts_v
    keep-history: 2
  content-client:
    base-url: ${CONTENT_SERVICE_BASE_URL:http://content-service:8088}
    internal-token: ${CONTENT_INTERNAL_TOKEN}

# internal 运维入口强保护（default deny + break-glass）。
ops:
  search:
    token: ${OPS_SEARCH_TOKEN:}
    token-previous: ${OPS_SEARCH_TOKEN_PREVIOUS:}
  guard:
    search-reindex:
      enabled: ${OPS_SEARCH_REINDEX_ENABLED:false}
      # 默认仅允许本机/回环（生产请改为堡垒机/内网管理网段）。
      allowlist: ${OPS_SEARCH_REINDEX_ALLOWLIST:127.0.0.1,::1}
    rate:
      window-seconds: ${OPS_RATE_WINDOW_SECONDS:60}
      max: ${OPS_RATE_MAX:3}
    lock:
      ttl-seconds: ${OPS_LOCK_TTL_SECONDS:600}
