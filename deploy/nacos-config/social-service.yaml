spring:
  datasource:
    url: ${SOCIAL_DB_URL:jdbc:mysql://mysql:3306/community_social?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SOCIAL_DB_USERNAME:community_social}
    password: ${SOCIAL_DB_PASSWORD:community_socialpass}
  data:
    redis:
      host: ${SOCIAL_REDIS_HOST:redis}
      port: ${SOCIAL_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET}

social:
  storage: db
  events:
    publisher: kafka
    outbox:
      # 默认开启：可靠投递作为默认安全态（可通过开关回滚到 after-commit 直发）。
      enabled: true
      relay-enabled: true
      batch-size: 200
      max-retries: 10
      base-delay-ms: 1000
      max-delay-ms: 60000
      relay-interval-ms: 5000
      send-timeout-ms: 3000
  # internal 接口令牌：建议按服务隔离，避免全局 token 泄露扩大爆炸半径。
  internal-token: ${SOCIAL_INTERNAL_TOKEN:}
  # 轮转窗口：灰度期间允许 previous 继续访问（配合 common/InternalTokenFilter）。
  internal-token-previous: ${SOCIAL_INTERNAL_TOKEN_PREVIOUS:}

clients:
  content:
    base-url: ${CONTENT_SERVICE_BASE_URL:http://content-service}
    internal-token: ${CONTENT_INTERNAL_TOKEN:}
    fail-open: false

# internal 运维入口强保护（default deny + break-glass）。
ops:
  social:
    token: ${OPS_SOCIAL_TOKEN:}
    token-previous: ${OPS_SOCIAL_TOKEN_PREVIOUS:}
  guard:
    outbox-replay:
      enabled: ${OPS_OUTBOX_REPLAY_ENABLED:false}
      # 默认仅允许本机/回环（生产请改为堡垒机/内网管理网段）。
      allowlist: ${OPS_OUTBOX_REPLAY_ALLOWLIST:127.0.0.1,::1}
    rate:
      window-seconds: ${OPS_RATE_WINDOW_SECONDS:60}
      max: ${OPS_RATE_MAX:3}
    lock:
      ttl-seconds: ${OPS_LOCK_TTL_SECONDS:600}
