spring:
  datasource:
    url: ${USER_DB_URL:jdbc:mysql://mysql:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${USER_DB_USERNAME:community}
    password: ${USER_DB_PASSWORD:communitypass}
  data:
    redis:
      host: ${USER_REDIS_HOST:redis}
      port: ${USER_REDIS_PORT:6379}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET}

user:
  # internal 接口令牌：建议按服务隔离，避免全局 token 泄露扩大爆炸半径。
  internal-token: ${USER_INTERNAL_TOKEN:}
  # 轮转窗口：灰度期间允许 previous 继续访问（配合 common/InternalTokenFilter）。
  internal-token-previous: ${USER_INTERNAL_TOKEN_PREVIOUS:}

  # 高权限 internal 写接口分域 token（最小权限）：/internal/users/{id}/password、/internal/users/{id}/moderation
  ops:
    internal-token: ${USER_OPS_INTERNAL_TOKEN:}
    internal-token-previous: ${USER_OPS_INTERNAL_TOKEN_PREVIOUS:}

  events:
    publisher: kafka
    outbox:
      # 默认开启：可靠投递作为默认安全态（可通过开关回滚到 after-commit 直发）。
      enabled: true
      relay-enabled: true
      batch-size: 200
      max-retries: 10
      base-delay-ms: 1000
      max-delay-ms: 60000
      relay-interval-ms: 5000
      send-timeout-ms: 3000

  # user-service -> social-service 聚合调用配置（internal read API + internal-token）。
  social-client:
    base-url: ${SOCIAL_SERVICE_BASE_URL:http://social-service}
    internal-token: ${SOCIAL_INTERNAL_TOKEN:}
    # 用户主页展示类读路径允许降级（避免 social-service 抖动影响主页面）。
    fail-open: true

qiniu:
  key:
    access: ${QINIU_ACCESS_KEY:}
    secret: ${QINIU_SECRET_KEY:}
  bucket:
    header:
      name: ${QINIU_BUCKET_HEADER_NAME:}
      url: ${QINIU_BUCKET_HEADER_URL:}
