gateway:
  origin-guard:
    enabled: true
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:12881
      - http://127.0.0.1:12881
      - http://localhost:12888
      - http://127.0.0.1:12888
    fail-open-when-allowlist-empty: false

spring:
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB
  mail:
    host: mailhog
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  health:
    elasticsearch:
      enabled: true

security:
  jwt:
    access-token-ttl-seconds: 900
    refresh-token-ttl-seconds: 604800
    refresh-cookie-name: refresh_token
    refresh-cookie-path: /api/auth
    refresh-cookie-same-site: Lax
    refresh-cookie-secure: false

auth:
  refresh:
    store: db
    cleanup:
      enabled: true
      interval-ms: 3600000
  captcha:
    store: redis
    ttl-seconds: 60
    max-failures: 3
  registration:
    code:
      store: redis
      ttl-seconds: 600
      max-failures: 3
      resend-cooldown-seconds: 60
      expose-code: false
    draft:
      store: redis
      ttl-seconds: 1800
    mail:
      enabled: true
      from: no-reply@community.local
      subject: 注册验证码
  password-reset:
    reset-base-url: http://localhost:12881
    store: redis
    ttl-seconds: 600
    request-window-seconds: 3600
    max-requests-per-email: 3
    max-requests-per-ip: 20
  login-rate-limit:
    enabled: true
    window-seconds: 60
    max-failures-per-ip: 20
    max-failures-per-user: 5
    captcha-required-failures-per-ip: 5
    captcha-required-failures-per-user: 2

http:
  idempotency:
    enabled: true
    store: DB

xxl:
  job:
    enabled: true
    admin:
      addresses: http://xxl-job-admin:8080/xxl-job-admin
    executor:
      appname: community-app
      address: ""

content:
  storage: redis
  events:
    publisher: local
  score:
    refresh:
      enabled: true
      batch-size: 200

events:
  outbox:
    enabled: true
    batch-size: 50
    processing-lease: 30s
    max-retries: 50
    base-backoff: 5s
    max-backoff: 10m
    worker-fixed-delay-ms: 1000

social:
  storage: db
  events:
    publisher: local

growth:
  business-zone-id: Asia/Shanghai

oss:
  client:
    base-url: http://community-oss:18090

search:
  storage: es
  idempotency:
    cleanup-enabled: true
    retention-days: 7
    cleanup-interval-ms: 21600000
  index:
    prefix: community_posts_v
    initialize: true

analytics:
  max-days-range: 31
  ingest:
    enabled: false
    record-uv: true
    record-dau: true
    include-paths:
      - /api/posts/**
      - /api/search/**
      - /api/notices/**
    exclude-paths:
      - /api/analytics/**
      - /api/auth/**
      - /api/ops/**
      - /actuator/**
      - /internal/**
      - /files/**
