spring:
  cloud:
    gateway:
      forwarded:
        enabled: false
      x-forwarded:
        enabled: false

security:
  jwt:
    issuer: community-auth

gateway:
  # Enable only with the controlled NGINX/load-balancer CIDRs supplied at runtime.
  trusted-proxy:
    enabled: ${GATEWAY_TRUSTED_PROXY_ENABLED:false}
    cidrs: ${GATEWAY_TRUSTED_PROXY_CIDRS:}
    source: compose-environment
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:12881
      - http://127.0.0.1:12881
      - http://localhost:12888
      - http://127.0.0.1:12888
  im-edge:
    service-id: community-im-gateway
    session-path: /api/im/sessions
    ws-path: /ws/im
  http:
    routes:
      - id: oss-api
        path-prefix: /api/oss
        service-id: community-oss
      - id: im-core
        path-prefix: /api/im
        service-id: im-core
      - id: bootstrap-api
        path-prefix: /api
        service-id: community-app
      - id: oss-files
        path-prefix: /files
        service-id: community-oss
    rate-limit:
      enabled: true
      fail-open-on-error: false
      policies: {}
    traffic-policy:
      default-policy-id: baseline
      default-tags:
        plane: http
      rules: []
