spring:
  kafka:
    consumer:
      properties:
        spring.json.trusted.packages: "com.nowcoder.community.*"
        spring.json.use.type.headers: true
    producer:
      acks: all
      properties:
        metadata.max.age.ms: 1000
        reconnect.backoff.ms: 100
        reconnect.backoff.max.ms: 1000
        request.timeout.ms: 3000
        delivery.timeout.ms: 5000
        max.block.ms: 5000

community:
  kafka-policy:
    retry:
      max-attempts: 3
      base-backoff: 1s
      max-backoff: 30s
    dlq:
      enabled: true
    producer:
      acks: all
      enable-idempotence: true
      max-in-flight-requests: 5
      metadata-max-age-ms: 1000
      reconnect-backoff-ms: 100
      reconnect-backoff-max-ms: 1000
      request-timeout-ms: 3000
      delivery-timeout-ms: 5000
      max-block-ms: 5000

# Rollback publisher switches:
# CONTENT_EVENTS_PUBLISHER=local
# SOCIAL_EVENTS_PUBLISHER=local
# USER_EVENTS_PUBLISHER=local
content:
  events:
    publisher: ${CONTENT_EVENTS_PUBLISHER:outbox-kafka}
    outbox-topic: ${CONTENT_EVENTS_OUTBOX_TOPIC:eventbus.content}
    kafka-topic: ${CONTENT_EVENTS_KAFKA_TOPIC:content.events}

social:
  events:
    publisher: ${SOCIAL_EVENTS_PUBLISHER:outbox-kafka}
    outbox-topic: ${SOCIAL_EVENTS_OUTBOX_TOPIC:eventbus.social}
    kafka-topic: ${SOCIAL_EVENTS_KAFKA_TOPIC:social.events}

im:
  kafka:
    topics:
      command-private-text: im.command.private-text
      command-room-text: im.command.room-text
      command-room-fanout-routed: im.command.room-fanout-routed
      event-private-persisted: im.event.private-persisted
      event-room-persisted: im.event.room-persisted
      event-private-committed: im.event.private-committed
      event-room-committed: im.event.room-committed
      event-private-rejected: im.event.private-rejected
      event-room-rejected: im.event.room-rejected
      event-room-member-changed: im.event.room-member-changed
      event-user-messaging-policy-changed: im.event.user-messaging-policy-changed
      event-user-block-relation-changed: im.event.user-block-relation-changed
  policy:
    outbox:
      topic: projection.im.policy

growth:
  task:
    outbox:
      post-topic: projection.growth.task.post
      comment-topic: projection.growth.task.comment
      like-topic: projection.growth.task.like
    kafka:
      consumer:
        group-id: growth-task-progress
        concurrency: 3
      topics:
        post-published: growth.task.post-published
        comment-created: growth.task.comment-created
        like-created: growth.task.like-created

search:
  outbox:
    post-topic: projection.search.post
  kafka:
    consumer:
      group-id: ${SEARCH_KAFKA_CONSUMER_GROUP_ID:search-post-projection}
      concurrency: ${SEARCH_KAFKA_CONSUMER_CONCURRENCY:3}

notice:
  kafka:
    consumer:
      group-id: ${NOTICE_KAFKA_CONSUMER_GROUP_ID:notice-projection}
      concurrency: ${NOTICE_KAFKA_CONSUMER_CONCURRENCY:3}

user:
  events:
    publisher: ${USER_EVENTS_PUBLISHER:outbox-kafka}
    outbox-topic: ${USER_EVENTS_OUTBOX_TOPIC:eventbus.user}
    kafka-topic: ${USER_EVENTS_KAFKA_TOPIC:user.events}
  reward:
    outbox:
      comment-topic: projection.user.reward.comment
    kafka:
      consumer:
        group-id: ${USER_REWARD_KAFKA_CONSUMER_GROUP_ID:user-reward-projection}
        concurrency: ${USER_REWARD_KAFKA_CONSUMER_CONCURRENCY:3}
