spring:
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

oss:
  security:
    service-jwt:
      issuer: ${OSS_SERVICE_JWT_ISSUER:community-auth}
      audience: ${OSS_SERVICE_JWT_AUDIENCE:community-oss}
      scope: ${OSS_SERVICE_JWT_SCOPE:oss.internal}
  public-base-url: http://localhost:12880
  object-store:
    mode: garage
    endpoint: http://garage:3900
    bucket: community-oss
    region: garage
    path-style: true
    local-root: /tmp/community-oss

community:
  oss:
    upload-recovery:
      enabled: true
      batch-size: 100
      stale-seconds: 300
      delay-ms: 60000
