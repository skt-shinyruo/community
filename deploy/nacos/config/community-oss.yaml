spring:
  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

oss:
  public-base-url: http://localhost:12880
  object-store:
    mode: garage
    endpoint: http://garage:3900
    bucket: community-oss
    region: garage
    path-style: true
    local-root: /tmp/community-oss

community:
  oss:
    upload-recovery:
      enabled: true
      batch-size: 100
      stale-seconds: 300
      delay-ms: 60000
