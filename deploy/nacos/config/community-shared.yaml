security:
  jwt:
    issuer: community-auth

community:
  observability:
    runtime-logging:
      enabled: true
      startup-summary-enabled: true
      periodic-summary-enabled: true
      periodic-summary-interval: 60s
      jvm:
        enabled: true
        memory-threshold-percent: 85
        gc-pause-threshold-ms: 200
        direct-memory-threshold-percent: 85
      executors:
        enabled: true
        saturation-threshold-percent: 85
      datasource:
        enabled: true
        pool-pending-threshold: 1
      sql:
        enabled: true
        slow-query-threshold-ms: 500
      redis:
        enabled: true
        pool-pending-threshold: 1
        slow-command-threshold-ms: 100
      kafka:
        enabled: true
        consumer-lag-threshold: 1000
      oss:
        enabled: true
        slow-operation-threshold-ms: 1000
      http-client:
        enabled: true
        slow-request-threshold-ms: 1000
      jobs:
        enabled: true
        slow-job-threshold-ms: 30000
      cache:
        enabled: true
        hit-ratio-threshold-percent: 80
      security:
        enabled: true
      logging-system:
        enabled: true
        queue-pressure-threshold-percent: 80
      system:
        enabled: true
        fd-usage-threshold-percent: 80
        disk-usage-threshold-percent: 90
        cpu-load-threshold-percent: 85
      http:
        access-log-enabled: true
        slow-request-threshold-ms: 1000
        exclude-paths:
          - /actuator/health
          - /actuator/info
