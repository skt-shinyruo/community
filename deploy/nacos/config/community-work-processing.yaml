events:
  outbox:
    enabled: true
    batch-size: 50
    processing-lease: 30s
    max-retries: 50
    base-backoff: 5s
    max-backoff: 10m
    worker-fixed-delay-ms: 1000

content:
  score:
    refresh:
      enabled: true
      batch-size: 200
      delay-ms: 30000
  media:
    upload-recovery:
      enabled: true
      batch-size: 50
      stale-seconds: 300
      delay-ms: 60000
    reference-reconciliation:
      enabled: true
      batch-size: 50
      delay-ms: 300000

market:
  wallet-action:
    process-batch-size: 50
    recovery-batch-size: 100
    processing-lease: 60s

drive:
  upload:
    recovery:
      enabled: true
      batch-size: 100
      stale-seconds: 300
      delay-ms: 60000

analytics:
  max-days-range: 31
  ingest:
    enabled: false
    record-uv: true
    record-dau: true
