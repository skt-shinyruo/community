spring:
  kafka:
    consumer:
      group-id: im-core
      auto-offset-reset: earliest

events:
  outbox:
    enabled: true
    batch-size: 50
    processing-lease: 30s
    max-retries: 50
    base-backoff: 5s
    max-backoff: 10m
    worker-fixed-delay-ms: 1000

im:
  kafka:
    consumer:
      group-id: im-core
      auto-offset-reset: earliest
    command:
      concurrency: 3
  message:
    max-chars: 10000
  room:
    max-members: 10000
  room-member-change:
    publisher: kafka
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:12881
      - http://127.0.0.1:12881
      - http://localhost:12888
      - http://127.0.0.1:12888
