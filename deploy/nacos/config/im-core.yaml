events:
  outbox:
    enabled: true
    batch-size: 50
    processing-lease: 30s
    max-retries: 50
    base-backoff: 5s
    max-backoff: 10m
    worker-fixed-delay-ms: 1000

im:
  kafka:
    command:
      concurrency: 3
  message:
    max-chars: 10000
  room:
    max-members: 10000
  room-member-change:
    publisher: kafka
  cors:
    allowed-origins: []
