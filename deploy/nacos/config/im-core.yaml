spring:
  kafka:
    consumer:
      group-id: im-core
      auto-offset-reset: earliest

events:
  outbox:
    enabled: true
    batch-size: 50
    processing-lease: 30s
    max-retries: 50
    base-backoff: 5s
    max-backoff: 10m
    worker-fixed-delay-ms: 1000

im:
  policy:
    community-service-id: ${IM_POLICY_COMMUNITY_SERVICE_ID:community-app}
    internal-scope: ${IM_INTERNAL_SCOPE:im.realtime.internal}
    request-timeout: ${IM_POLICY_REQUEST_TIMEOUT:500ms}
    rejection-cache-ttl: ${IM_POLICY_REJECTION_CACHE_TTL:500ms}
    rejection-cache-max-entries: ${IM_POLICY_REJECTION_CACHE_MAX_ENTRIES:100000}
  kafka:
    consumer:
      group-id: im-core
      auto-offset-reset: earliest
    command:
      concurrency: 3
  message:
    max-chars: 10000
  room:
    max-members: 10000
  room-member-change:
    publisher: kafka
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:12881
      - http://127.0.0.1:12881
      - http://localhost:12888
      - http://127.0.0.1:12888
