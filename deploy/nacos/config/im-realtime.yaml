spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        service: im-realtime-worker
        metadata:
          draining: ${im.realtime.worker.drain-enabled:false}
          maxConnections: ${im.realtime.worker.max-connections:10000}
          activeConnectionHint: ${im.realtime.worker.active-connection-hint:0}
          shardGroup: ${im.realtime.worker.shard-group:default}
          capacityWeight: ${im.realtime.worker.capacity-weight:100}
          roomFanoutInboxSlot: ${im.room-fanout.worker-inbox-slot}
  kafka:
    consumer:
      group-id: im-realtime-${IM_REALTIME_WORKER_ID:${HOSTNAME:local}}
      auto-offset-reset: latest

im:
  clients:
    community-service-id: community-app
    im-core-service-id: im-core
    membership-snapshot-service-id: im-core
    policy-snapshot-service-id: community-app
    snapshot-timeout-ms: 3000
    internal-scope: im.realtime.internal
  community:
    timeout-ms: 1500
  projection:
    bootstrap-on-startup: true
  room-presence:
    key-prefix: "im:"
    ttl: PT30S
    heartbeat-interval: PT10S
  room-fanout:
    owner-group-id: im-realtime-room-fanout-owner
    owner-concurrency: 3
    routed-command-topic: im.command.room-fanout-routed
    routed-command-partitions: 64
    worker-inbox-slot: ${IM_ROOM_FANOUT_WORKER_INBOX_SLOT}
    worker-inbox-slot-metadata-key: roomFanoutInboxSlot
    publish-timeout: PT1S
    worker-directory-cache-ttl: PT0.5S
  session:
    worker-service-id: im-realtime-worker
    worker-id: ${IM_REALTIME_WORKER_ID:${HOSTNAME:local}}
    ws-base-url: ws://127.0.0.1:18081/internal/ws/im
    ticket-ttl: PT2M
    worker-id-metadata-key: workerId
    ws-path-metadata-key: wsPath
    ws-port-metadata-key: wsPort
  kafka:
    consumer:
      group-id: im-realtime-${IM_REALTIME_WORKER_ID:${HOSTNAME:local}}
      auto-offset-reset: latest
    event:
      concurrency: 3
  ws:
    path: /internal/ws/im
    max-inbound-chars: 10000
    outbound-buffer-size: 256
    kafka-send-timeout-ms: 5000
    room-flush-interval-ms: 50
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:12881
      - http://127.0.0.1:12881
      - http://localhost:12888
      - http://127.0.0.1:12888
  realtime:
    worker:
      max-connections: 10000
      active-connection-hint: 0
      drain-enabled: false
      shard-group: default
      capacity-weight: 100
