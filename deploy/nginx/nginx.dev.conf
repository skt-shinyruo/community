events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream community_gateway_pool {
    server community-gateway:8080 max_fails=3 fail_timeout=10s;
  }

  upstream xxl_job_admin_pool {
    server xxl-job-admin:8080 max_fails=3 fail_timeout=10s;
  }

  server {
    listen 8080;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /ws/im {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://community_gateway_pool;
    }

    location / {
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_pass http://community_gateway_pool;
    }
  }

  server {
    listen 8081;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = / {
      return 302 /xxl-job-admin/;
    }

    location / {
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
      proxy_pass http://xxl_job_admin_pool;
    }
  }
}
