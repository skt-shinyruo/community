groups:
  - name: service-health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 60s
        labels:
          severity: critical
        annotations:
          summary: "服务不可用: {{ $labels.job }}"
          description: "Prometheus 无法抓取 {{ $labels.instance }} 的指标（up=0）。"

  - name: kafka-dlq
    rules:
      - alert: KafkaDlqPublished
        # NOTE: Requires `kafka_dlq_published_total{original_topic=..., error_type=...}`.
        # If the metric is not implemented yet, this rule stays inert and can be removed.
        expr: sum by (job, original_topic) (increase(kafka_dlq_published_total[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Kafka DLQ 有新增消息: {{ $labels.job }}"
          description: "近 5 分钟内 DLQ 产生了新消息（original_topic={{ $labels.original_topic }}）。请结合服务日志定位失败原因，并评估是否需要回放。"
