receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  filelog/docker_stdout:
    include:
      - /var/lib/docker/containers/*/*.log
    start_at: end
    include_file_path: true
    operators:
      - type: container

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  transform/logs_bodymap:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(body, ParseJSON(body)) where IsString(body) and IsMatch(body, "^\\s*\\{")
      - context: scope
        statements:
          - set(attributes["elastic.mapping.mode"], "bodymap")
  filter/backend_json_logs:
    error_mode: ignore
    logs:
      log_record:
        - 'not (IsMap(body) and body["service.name"] != nil)'
  # OTLP traces/metrics and stdout-backed application logs all belong to the community services.
  resource/community_service_namespace:
    attributes:
      - key: service.namespace
        value: community
        action: upsert
  batch:
    send_batch_size: 1024
    timeout: 5s
  cumulativetodelta:
  batch/metrics:
    send_batch_size: 512
    timeout: 15s

exporters:
  elasticsearch/otel:
    endpoints:
      - http://elasticsearch:9200
    mapping:
      mode: ecs
  elasticsearch/logs:
    endpoints:
      - http://elasticsearch:9200
    mapping:
      mode: ecs
    logs_index: logs-community-default

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/community_service_namespace, batch]
      exporters: [elasticsearch/otel]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource/community_service_namespace, cumulativetodelta, batch/metrics]
      exporters: [elasticsearch/otel]
    logs:
      receivers: [filelog/docker_stdout]
      processors: [memory_limiter, transform/logs_bodymap, filter/backend_json_logs, resource/community_service_namespace, batch]
      exporters: [elasticsearch/logs]
    logs/otlp:
      receivers: [otlp]
      processors: [memory_limiter, resource/community_service_namespace, batch]
      exporters: [elasticsearch/logs]
