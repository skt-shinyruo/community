global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    basic_auth: &metrics_basic_auth
      username: prometheus
      password: dev-prometheus-pass
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: ops-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["ops-service:8090"]

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["auth-service:8082"]

  - job_name: search-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["search-service:8083"]

  - job_name: message-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["message-service:8084"]

  - job_name: analytics-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["analytics-service:8085"]

  - job_name: social-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["social-service:8086"]

  - job_name: user-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["user-service:8087"]

  - job_name: content-service
    metrics_path: /actuator/prometheus
    basic_auth: *metrics_basic_auth
    static_configs:
      - targets: ["content-service:8088"]
