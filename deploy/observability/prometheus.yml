global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: community-app
    metrics_path: /actuator/prometheus
    basic_auth: &metrics_basic_auth
      username: prometheus
      password: dev-prometheus-pass
    static_configs:
      - targets: ["community-app:8080"]
