<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 960 520">
  <title>Strict DDD tactical layering</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.t{font-size:16px;font-weight:700}.s{font-size:13px;fill:#475569}.box{rx:10;fill:#f8fafc;stroke:#94a3b8;stroke-width:1.6}.app{fill:#ecfeff;stroke:#0891b2}.dom{fill:#f0fdf4;stroke:#16a34a}.infra{fill:#fefce8;stroke:#ca8a04}.api{fill:#eef2ff;stroke:#6366f1}.bad{stroke:#dc2626;stroke-width:2;stroke-dasharray:8 5;fill:none}.edge{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="520" fill="#fff"/>
  <text x="40" y="42" class="h">community-app Business Domain Boundary</text>
  <rect x="72" y="82" width="220" height="78" class="box"/><text x="104" y="112" class="t">Inbound adapters</text><text x="91" y="137" class="s">controller / listener / job</text>
  <rect x="370" y="82" width="220" height="78" class="box app"/><text x="416" y="112" class="t">ApplicationService</text><text x="398" y="137" class="s">use case and transaction</text>
  <rect x="370" y="224" width="220" height="86" class="box dom"/><text x="423" y="255" class="t">Domain</text><text x="393" y="281" class="s">model / service / repository</text>
  <rect x="370" y="374" width="220" height="78" class="box infra"/><text x="417" y="404" class="t">Infrastructure</text><text x="407" y="429" class="s">MyBatis / Redis / outbox</text>
  <rect x="672" y="198" width="220" height="72" class="box api"/><text x="706" y="228" class="t">Foreign owner API</text><text x="704" y="252" class="s">api.query / api.action</text>
  <rect x="672" y="302" width="220" height="72" class="box api"/><text x="706" y="332" class="t">Contract events</text><text x="709" y="356" class="s">contracts.event only</text>
  <path class="edge" d="M292 121 H370"/><path class="edge" d="M480 160 V224"/><path class="edge" d="M480 310 V374"/><path class="edge" d="M590 244 H672"/><path class="edge" d="M590 338 H672"/>
  <path class="bad" d="M184 160 C184 260 280 390 370 408"/><path class="bad" d="M184 160 C270 196 300 252 370 266"/><path class="bad" d="M184 160 C390 178 514 194 672 230"/>
  <text x="78" y="219" class="s">Adapters only adapt input and call same-domain ApplicationService.</text>
  <text x="78" y="244" class="s">They do not call domain, mapper, infra, or foreign APIs directly.</text>
  <text x="378" y="488" class="s">Persistence reaches the domain through repository interfaces or application-owned ports.</text>
</svg>
