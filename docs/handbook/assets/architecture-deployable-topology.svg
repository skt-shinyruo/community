  <path class="edge dash" d="M580 132 C520 132 520 162 580 176"/><text x="488" y="143" class="s">oss client</text>
  <path class="edge" d="M765 102 H812"/><path class="edge" d="M765 286 C790 286 790 384 812 384"/><path class="edge" d="M765 378 H812"/>
  <path class="edge" d="M672 134 C672 154 784 175 812 175"/><path class="edge" d="M672 226 C690 246 784 244 812 244"/><path class="edge" d="M672 134 C710 134 774 315 812 315"/>
