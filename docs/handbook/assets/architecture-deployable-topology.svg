<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 960 520">
  <title>Community deployable topology</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.t{font-size:15px}.s{font-size:13px;fill:#475569}.box{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.6;rx:10}.edge{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 5}.store{fill:#eef2ff;stroke:#818cf8}.svc{fill:#ecfeff;stroke:#06b6d4}.gw{fill:#fff7ed;stroke:#f97316}.infra{fill:#f1f5f9;stroke:#64748b}
    </style>
  </defs>
  <rect width="960" height="520" fill="#ffffff"/>
  <text x="40" y="42" class="h">Deployable Topology</text>
  <rect x="42" y="86" width="150" height="64" class="box"/><text x="72" y="112" class="t">Browser</text><text x="72" y="134" class="s">Client</text>
  <rect x="42" y="190" width="150" height="64" class="box"/><text x="72" y="217" class="t">Vue3 SPA</text><text x="72" y="239" class="s">frontend</text>
  <rect x="282" y="132" width="185" height="82" class="box gw"/><text x="317" y="164" class="t">community-gateway</text><text x="315" y="188" class="s">/api, /files, /ws/im</text>
