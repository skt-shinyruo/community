<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 960 520">
  <title>Reliability mechanisms for idempotency and outbox</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10z" fill="#334155"/></marker>
    <style>
      text{font-family:Arial,sans-serif;fill:#0f172a}.h{font-size:24px;font-weight:700}.t{font-size:15px;font-weight:700}.s{font-size:13px;fill:#475569}.lane{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;rx:14}.box{fill:#fff;stroke:#94a3b8;stroke-width:1.5;rx:9}.ok{fill:#f0fdf4;stroke:#22c55e}.warn{fill:#fff7ed;stroke:#f97316}.dead{fill:#fef2f2;stroke:#ef4444}.edge{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="520" fill="#fff"/>
  <text x="40" y="42" class="h">Reliability: Replays and Deferred Side Effects</text>
  <rect x="44" y="76" width="872" height="170" class="lane"/><text x="64" y="105" class="t">HTTP Idempotency-Key</text>
  <rect x="78" y="142" width="140" height="48" class="box"/><text x="105" y="171" class="t">Acquire</text>
  <rect x="278" y="142" width="140" height="48" class="box warn"/><text x="311" y="171" class="t">PROCESSING</text>
  <rect x="478" y="142" width="140" height="48" class="box ok"/><text x="518" y="171" class="t">SUCCESS</text>
  <rect x="678" y="142" width="160" height="48" class="box dead"/><text x="703" y="171" class="t">Conflict / 503</text>
  <path class="edge" d="M218 166 H278"/><path class="edge" d="M418 166 H478"/><path class="edge" d="M348 190 C350 226 708 226 742 190"/><text x="526" y="219" class="s">duplicate returns cached response; concurrent or mismatch rejects</text>
  <rect x="44" y="286" width="872" height="172" class="lane"/><text x="64" y="315" class="t">DB Outbox</text>
  <rect x="78" y="352" width="130" height="48" class="box"/><text x="101" y="381" class="t">Domain fact</text>
  <rect x="258" y="352" width="130" height="48" class="box warn"/><text x="291" y="381" class="t">PENDING</text>
  <rect x="438" y="352" width="130" height="48" class="box warn"/><text x="461" y="381" class="t">PROCESSING</text>
  <rect x="618" y="326" width="130" height="48" class="box ok"/><text x="645" y="355" class="t">SUCCEEDED</text>
  <rect x="618" y="394" width="130" height="48" class="box dead"/><text x="664" y="423" class="t">DEAD</text>
  <path class="edge" d="M208 376 H258"/><path class="edge" d="M388 376 H438"/><path class="edge" d="M568 367 H618"/><path class="edge" d="M568 386 C586 408 594 418 618 418"/>
  <path class="edge" d="M503 400 C500 456 320 456 323 400"/><text x="356" y="449" class="s">retry after failure or lease recovery</text>
</svg>
