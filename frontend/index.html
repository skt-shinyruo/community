<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23f4e9dc'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='34' font-family='Georgia, serif' fill='%23b17343'%3EC%3C/text%3E%3C/svg%3E"
    />
    <title>Community</title>
    <script src="/app-config.js"></script>
    <script>
      ;(() => {
        try {
          const raw = localStorage.getItem('community.ui')
          if (!raw) return
          const v = JSON.parse(raw)
          if (v && (v.theme === 'light' || v.theme === 'dark')) document.documentElement.dataset.theme = v.theme
          if (v && (v.density === 'compact' || v.density === 'comfortable'))
            document.documentElement.dataset.density = v.density
        } catch {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
