server:
  port: 8080

spring:
  application:
    name: gateway
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: ops-service
          uri: lb://ops-service
          predicates:
            - Path=/api/ops/**
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/api/notices/**,/api/messages/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/likes/**,/api/follows/**,/api/blocks/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: user-files
          uri: lb://user-service
          predicates:
            - Path=/files/**
        - id: content-service
          uri: lb://content-service
          predicates:
            - Path=/api/posts/**,/api/categories/**,/api/tags/**,/api/reports/**,/api/moderation/**,/api/bookmarks/**,/api/subscriptions/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: &frontend_origins
              - http://localhost:5173
              - http://localhost:12881
              - http://localhost:12888
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    hmac-secret: ${GATEWAY_JWT_HMAC_SECRET:${JWT_HMAC_SECRET:}}

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

analytics:
  collect:
    # 采集属于可丢弃链路，默认关闭；可在配置中心按环境/灰度开启。
    enabled: false
    timeout-ms: 300
    max-concurrency: 50
    # 网关侧 in-process 去重（有界 TTL 缓存）。注意：多实例不共享，最终以 analytics-service 侧 Redis 去重为准。
    dedup-enabled: true
    uv-cache-max-size: 200000
    dau-cache-max-size: 200000
    dedup-ttl-seconds: 86400

gateway:
  audit:
    enabled: true
  webclient:
    # 出站调用兜底：避免下游网络异常导致请求悬挂与连接堆积拖垮网关。
    connect-timeout-ms: 1000
    response-timeout-ms: 2000
    read-timeout-ms: 2000
    write-timeout-ms: 2000
    pool:
      max-connections: 500
      pending-acquire-timeout-ms: 2000
      pending-acquire-max-count: 2000
      max-idle-time-seconds: 60
      max-life-time-seconds: 300
      evict-in-background-seconds: 60
      metrics-enabled: true
  request-size-limit:
    enabled: true
    # 3 MiB：覆盖绝大多数 JSON 写请求，同时兼容 local avatar upload（<=2 MiB + multipart 开销）
    max-bytes: 3145728
    # 缺失 Content-Length 时默认放行（兼容性更好）；生产可考虑打开 fail-closed
    fail-closed-when-unknown: false
  trusted-proxy:
    enabled: false
    cidrs: []
  origin-guard:
    enabled: true
    allowed-origins: *frontend_origins
    # 生产建议 fail-closed：allowlist 漏配时拒绝敏感 cookie 会话入口（login/refresh/logout）。
    fail-open-when-allowlist-empty: false
  rate-limit:
    enabled: true
    # 降级策略：Redis 不可用时 fail-open，避免把 Redis 抖动放大成对外 503（可用性优先，配合告警/审计治理）。
    fail-open: true
    # 运维/高风险入口关闭开关：匹配到的路径按 404 直接拒绝（降低攻击面）。
    blocked-path-patterns: []
    rules:
      # 边界 anti-abuse：按 IP 限流
      - id: login
        methods: [POST]
        path-patterns: [/api/auth/login]
        window-seconds: 60
        max-requests: 30
        key-strategy: IP
      - id: register
        methods: [POST]
        path-patterns: [/api/auth/register]
        window-seconds: 60
        max-requests: 10
        key-strategy: IP
      - id: captcha
        methods: [GET, POST]
        path-patterns: [/api/auth/captcha, /api/auth/captcha/verify]
        window-seconds: 60
        max-requests: 60
        key-strategy: IP
      - id: password-reset
        methods: [POST]
        path-patterns: [/api/auth/password/reset/request, /api/auth/password/reset/confirm]
        window-seconds: 60
        max-requests: 30
        key-strategy: IP
      # 运维平面：按用户限流（双保险，避免误触发/滥用）
      - id: ops
        methods: [POST]
        path-patterns: [/api/ops/**]
        window-seconds: 60
        max-requests: 30
        key-strategy: USER

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    # 默认使用 Nacos；仅在显式设置 DUBBO_REGISTRY_ADDR 时覆盖（应急/迁移窗口）。
    address: "${DUBBO_REGISTRY_ADDR:nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}}"
    parameters:
      namespace: ${NACOS_NAMESPACE:}
      group: ${NACOS_GROUP:DEFAULT_GROUP}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: com.nowcoder.community
  consumer:
    check: false
    retries: 0
    timeout: 3000
