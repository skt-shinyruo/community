server:
  port: 8080

spring:
  application:
    name: gateway
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: search-ops-reindex
          uri: lb://search-service
          predicates:
            - Method=POST
            - Path=/api/ops/search/reindex
          filters:
            - SetPath=/internal/search/reindex
            - AddRequestHeader=X-Internal-Token, ${SEARCH_INTERNAL_TOKEN:}
            - AddRequestHeader=X-External-Path, /api/ops/search/reindex
        - id: search-reindex
          uri: lb://search-service
          predicates:
            - Method=POST
            - Path=/api/search/internal/reindex
          filters:
            - SetPath=/internal/search/reindex
            - AddRequestHeader=X-Internal-Token, ${SEARCH_INTERNAL_TOKEN:}
            - AddRequestHeader=X-External-Path, /api/search/internal/reindex
            # 对外 internal 命名属于历史遗留入口：保留短期兼容，但明确标记弃用。
            - AddResponseHeader=Deprecation, true
        - id: search-service
          uri: lb://search-service
          predicates:
            - Path=/api/search/**
        - id: message-service
          uri: lb://message-service
          predicates:
            - Path=/api/notices/**,/api/messages/**
        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**
        - id: social-service
          uri: lb://social-service
          predicates:
            - Path=/api/likes/**,/api/follows/**,/api/blocks/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: user-files
          uri: lb://user-service
          predicates:
            - Path=/files/**
        - id: content-service
          uri: lb://content-service
          predicates:
            - Path=/api/posts/**,/api/categories/**,/api/tags/**,/api/reports/**,/api/moderation/**,/api/bookmarks/**,/api/subscriptions/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: &frontend_origins
              - http://localhost:5173
              - http://localhost:12881
              - http://localhost:12888
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    hmac-secret: ${GATEWAY_JWT_HMAC_SECRET:${JWT_HMAC_SECRET:}}

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

analytics:
  collect:
    enabled: true
    internal-token: ${ANALYTICS_INTERNAL_TOKEN:}
    timeout-ms: 300
    max-concurrency: 50
    # 网关侧 in-process 去重（有界 TTL 缓存）。注意：多实例不共享，最终以 analytics-service 侧 Redis 去重为准。
    dedup-enabled: true
    uv-cache-max-size: 200000
    dau-cache-max-size: 200000
    dedup-ttl-seconds: 86400

gateway:
  request-size-limit:
    enabled: true
    # 3 MiB：覆盖绝大多数 JSON 写请求，同时兼容 local avatar upload（<=2 MiB + multipart 开销）
    max-bytes: 3145728
    # 缺失 Content-Length 时默认放行（兼容性更好）；生产可考虑打开 fail-closed
    fail-closed-when-unknown: false
  trusted-proxy:
    enabled: false
    cidrs: []
  origin-guard:
    enabled: true
    allowed-origins: *frontend_origins
    # 生产建议 fail-closed：allowlist 漏配时拒绝敏感 cookie 会话入口（login/refresh/logout）。
    fail-open-when-allowlist-empty: false
  rate-limit:
    enabled: true
    # 生产建议 fail-closed：限流依赖（Redis）不可用时返回 503，避免静默放行导致风控失效。
    fail-open: false
    # 运维/高风险入口关闭开关：匹配到的路径按 404 直接拒绝（降低攻击面）。
    # legacy：对外却叫 internal，易误用且攻击面更大；默认禁用并要求迁移到 /api/ops/**。
    blocked-path-patterns:
      - /api/search/internal/reindex
    rules:
      # 登录/注册/验证码：按 IP 限流
      - id: login
        methods: [POST]
        path-patterns: [/api/auth/login]
        window-seconds: 60
        max-requests: 30
        key-strategy: IP
      - id: register
        methods: [POST]
        path-patterns: [/api/auth/register]
        window-seconds: 60
        max-requests: 10
        key-strategy: IP
      - id: captcha
        methods: [GET, POST]
        path-patterns: [/api/auth/captcha, /api/auth/captcha/verify]
        window-seconds: 60
        max-requests: 60
        key-strategy: IP
      - id: password-reset
        methods: [POST]
        path-patterns: [/api/auth/password/reset/request, /api/auth/password/reset/confirm]
        window-seconds: 60
        max-requests: 30
        key-strategy: IP

      # 业务敏感操作：优先按用户，其次按 IP
      - id: post-create
        methods: [POST]
        path-patterns: [/api/posts]
        window-seconds: 60
        max-requests: 30
        key-strategy: USER_OR_IP
      - id: comment-create
        methods: [POST]
        path-patterns: [/api/posts/*/comments]
        window-seconds: 60
        max-requests: 60
        key-strategy: USER_OR_IP
      - id: message-send
        methods: [POST]
        path-patterns: [/api/messages]
        window-seconds: 60
        max-requests: 30
        key-strategy: USER_OR_IP
      - id: social-actions
        methods: [POST]
        path-patterns: [/api/likes, /api/follows]
        window-seconds: 60
        max-requests: 120
        key-strategy: USER_OR_IP

      # 管理/审核：更严格（也便于观测与告警）
      - id: moderation
        methods: [POST]
        path-patterns: [/api/posts/*/top, /api/posts/*/wonderful, /api/posts/*/delete]
        window-seconds: 60
        max-requests: 30
        key-strategy: USER
      # 高成本运维操作：严格限流，避免误触发/滥用（可通过配置中心临时调小/关闭）
      - id: search-reindex
        methods: [POST]
        path-patterns: [/api/search/internal/reindex, /api/ops/search/reindex]
        window-seconds: 60
        max-requests: 2
        key-strategy: USER
