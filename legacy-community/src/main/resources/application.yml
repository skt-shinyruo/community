server:
  port: 8081
  servlet:
    context-path: /community

spring:
  application:
    name: legacy-community
  config:
    import: optional:nacos:
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: ${LEGACY_DB_URL:jdbc:mysql://127.0.0.1:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${LEGACY_DB_USERNAME:community}
    password: ${LEGACY_DB_PASSWORD:community}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${LEGACY_REDIS_HOST:127.0.0.1}
      port: ${LEGACY_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${LEGACY_KAFKA_BOOTSTRAP:127.0.0.1:9092}
    listener:
      auto-startup: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.entity
  configuration:
    map-underscore-to-camel-case: true

caffeine:
  posts:
    max-size: 1000
    expire-seconds: 180

community:
  path:
    domain: ${COMMUNITY_DOMAIN:http://localhost:8081}
    upload: ${COMMUNITY_UPLOAD_PATH:}

qiniu:
  key:
    access: ${QINIU_ACCESS_KEY:}
    secret: ${QINIU_SECRET_KEY:}
  bucket:
    header:
      name: ${QINIU_BUCKET_HEADER_NAME:}

quniu:
  bucket:
    header:
      url: ${QINIU_BUCKET_HEADER_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

