security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

clients:
  social:
    fail-open: true

message:
  idempotency:
    cleanup-enabled: false
    retention-days: 1

spring:
  application:
    name: message-service
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:h2:mem:message;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    listener:
      auto-startup: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.message.entity
  configuration:
    map-underscore-to-camel-case: true

http:
  idempotency:
    enabled: true
    store: DB

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    address: N/A
  protocol:
    name: dubbo
    port: -1
  consumer:
    check: false
    init: false
    lazy: true
    retries: 0
    timeout: 3000
  provider:
    timeout: 3000
