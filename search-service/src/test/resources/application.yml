search:
  storage: memory
  internal-token: test-search-internal-token
  idempotency:
    cleanup-enabled: false
    retention-days: 1

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  kafka:
    listener:
      auto-startup: false
  datasource:
    url: jdbc:h2:mem:search;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
