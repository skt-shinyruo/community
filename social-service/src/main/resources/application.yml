server:
  port: 8086

social:
  # 社交关系存储模式：
  # - db: MySQL 为 SSOT（默认推荐）
  # - redis: 仅用于本地/压测/演示（非 SSOT，不推荐在 prod 使用）
  # - memory: 仅用于单测/演示
  storage: db
  events:
    publisher: kafka

events:
  outbox:
    enabled: true
    relay-enabled: true
    # MySQL 8+ 推荐开启：多实例 relay 并发认领时避免头阻塞（不支持可关闭回退）。
    claim-skip-locked-enabled: true
    batch-size: 200
    max-retries: 10
    base-delay-ms: 1000
    max-delay-ms: 60000
    relay-interval-ms: 5000
    send-timeout-ms: 3000

spring:
  application:
    name: social-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  data:
    redis:
      host: ${SOCIAL_REDIS_HOST:127.0.0.1}
      port: ${SOCIAL_REDIS_PORT:6379}
  datasource:
    url: ${SOCIAL_DB_URL:jdbc:mysql://127.0.0.1:3306/community_social?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SOCIAL_DB_USERNAME:${SOCIAL_DB_USER:community_social}}
    password: ${SOCIAL_DB_PASSWORD:community_socialpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:${AUTH_JWT_HMAC_SECRET:}}

clients:
  content:
    fail-open: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    # 默认使用 Nacos；仅在显式设置 DUBBO_REGISTRY_ADDR 时覆盖（应急/迁移窗口）。
    address: "${DUBBO_REGISTRY_ADDR:nacos://${NACOS_SERVER_ADDR:127.0.0.1:8848}}"
    parameters:
      namespace: ${NACOS_NAMESPACE:}
      group: ${NACOS_GROUP:DEFAULT_GROUP}
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: com.nowcoder.community
  consumer:
    check: false
    retries: 0
    timeout: 3000
  provider:
    timeout: 3000
