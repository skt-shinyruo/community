social:
  storage: memory
  events:
    publisher: memory

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:h2:mem:social;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes
