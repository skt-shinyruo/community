server:
  port: 8087

spring:
  application:
    name: user-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: ${USER_DB_URL:jdbc:mysql://127.0.0.1:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${USER_DB_USERNAME:${MYSQL_USER:}}
    password: ${USER_DB_PASSWORD:${MYSQL_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.user.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:${AUTH_JWT_HMAC_SECRET:}}

qiniu:
  key:
    access: ${QINIU_ACCESS_KEY:}
    secret: ${QINIU_SECRET_KEY:}
  bucket:
    header:
      name: ${QINIU_BUCKET_HEADER_NAME:}
      url: ${QINIU_BUCKET_HEADER_URL:}

user:
  internal-token: ${USER_INTERNAL_TOKEN:${INTERNAL_TOKEN:}}
  social-client:
    connect-timeout: 200ms
    read-timeout: 800ms
