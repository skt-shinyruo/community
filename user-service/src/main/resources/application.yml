server:
  port: 8087

spring:
  application:
    name: user-service
  config:
    import: "optional:nacos:${spring.application.name}.yaml"
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
  datasource:
    url: ${USER_DB_URL:jdbc:mysql://127.0.0.1:3306/community?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${USER_DB_USERNAME:${MYSQL_USER:}}
    password: ${USER_DB_PASSWORD:${MYSQL_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    consumer:
      group-id: user-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: manual

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.user.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

community:
  metrics:
    basic-auth:
      username: ${METRICS_BASIC_AUTH_USERNAME:prometheus}
      password: ${METRICS_BASIC_AUTH_PASSWORD:dev-prometheus-pass}

security:
  jwt:
    hmac-secret: ${JWT_HMAC_SECRET:${AUTH_JWT_HMAC_SECRET:}}

qiniu:
  key:
    access: ${QINIU_ACCESS_KEY:}
    secret: ${QINIU_SECRET_KEY:}
  bucket:
    header:
      name: ${QINIU_BUCKET_HEADER_NAME:}
      url: ${QINIU_BUCKET_HEADER_URL:}

user:
  avatar:
    storage: ${USER_AVATAR_STORAGE:local}
    files-base-dir: ${USER_FILES_BASE_DIR:/tmp/community-files}
    public-base-url: ${USER_PUBLIC_BASE_URL:http://localhost:12881}
  events:
    publisher: kafka
    outbox:
      enabled: true
      relay-enabled: true
      # MySQL 8+ 推荐开启：多实例 relay 并发认领时避免头阻塞（不支持可关闭回退）。
      claim-skip-locked-enabled: true
      batch-size: 200
      max-retries: 10
      base-delay-ms: 1000
      max-delay-ms: 60000
      relay-interval-ms: 5000
      send-timeout-ms: 3000
  social-client:
    # 用户主页展示类读路径允许降级（避免 social-service 抖动影响主页面）。
    fail-open: true

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  registry:
    address: ${DUBBO_REGISTRY_ADDR:zookeeper://127.0.0.1:2181/dubbo}
  protocol:
    name: dubbo
    port: -1
  scan:
    base-packages: com.nowcoder.community
  consumer:
    check: false
    retries: 0
    timeout: 3000
  provider:
    timeout: 3000
