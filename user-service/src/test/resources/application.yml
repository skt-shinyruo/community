spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
  datasource:
    url: jdbc:h2:mem:user;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.nowcoder.community.user.entity
  configuration:
    map-underscore-to-camel-case: true

security:
  jwt:
    hmac-secret: test-jwt-secret-please-change-at-least-32bytes

qiniu:
  key:
    access: test-ak
    secret: test-sk
  bucket:
    header:
      name: test-bucket
      url: http://bucket.local
